on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  pwa:
    name: Progressive Web App Deployment
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
    - uses: actions/checkout@v6
    - uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
        extra_nix_config: |
          extra-substituters = https://cache.garnix.io
          extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
    - uses: DeterminateSystems/magic-nix-cache-action@v13
    - run: sleep 15 #  Sleep hoping Garnix evaluation will start after
    - uses: lewagon/wait-on-check-action@v1.5.0
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        check-regexp: 'Evaluate flake.nix'
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - uses: lewagon/wait-on-check-action@v1.5.0
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        check-regexp: 'package pages.*'
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        fail-on-no-checks: false
    - run: nix build .#pages -o dist
    - uses: actions/upload-pages-artifact@v4
      with:
        path: ./dist
    - uses: actions/deploy-pages@v4
      id: deployment

  android:
    name: Android Releases
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # Required by 'gh release'
      checks: read    # Required by wait-on-check-action
      statuses: read  # Required by wait-on-check-action
    steps:
    - uses: actions/checkout@v6
    - uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
        extra_nix_config: |
          extra-substituters = https://cache.garnix.io
          extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
    - uses: DeterminateSystems/magic-nix-cache-action@v13
    - run: sleep 15 #  Sleep hoping Garnix evaluation will start after
    - uses: lewagon/wait-on-check-action@v1.5.0
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        check-regexp: 'Evaluate flake.nix'
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - uses: lewagon/wait-on-check-action@v1.5.0
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        check-regexp: 'devShell.*'
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        fail-on-no-checks: false
    - run: |
        nix develop -c dx build --android --release --frozen
        # TODO Fix App’s icons
        mv --verbose target/dx/log-workout/release/android/app/app/build/outputs/apk/debug/app-debug.apk LogOut.aarch64.apk
        scripts/android-sign.sh LogOut.aarch64.apk # Sign APK
    - name: Rolling Release
      if: github.ref == 'refs/heads/main'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        DATE=$(date -u +%Y-%m-%d)
        TAG="rolling-$DATE"
        if gh release view "$TAG" >/dev/null 2>&1; then
          echo "Rolling release for $DATE already exists. Skipping."
        else
          # Find and delete rolling releases older than 7 days
          gh release list --limit 100 | awk '/^rolling-/ {print $1}' | while read -r OLD_TAG; do
            OLD_DATE=${OLD_TAG#rolling-}
            if [ "$(date -d "$OLD_DATE" +%s)" -lt "$(date -d "7 days ago" +%s)" ]; then
               echo "Deleting old release: $OLD_TAG"
               gh release delete "$OLD_TAG" --yes --cleanup-tag
            fi
          done
          # Create the new rolling release
          gh release create "$TAG" "LogOut.aarch64.apk" \
            --title "Rolling $DATE" \
            --notes "Automated rolling release for $DATE" \
            --prerelease
        fi
    - name: Stable Release
      if: startsWith(github.ref, 'refs/tags/v')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        gh release create "$TAG" "LogOut.aarch64.apk" \
          --title "LogOut $TAG" \
          --notes "Release $TAG"
