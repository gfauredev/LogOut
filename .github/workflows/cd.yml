name: CD

on:
  check_suite:
    types: [completed]
  push:
    tags:
      - 'v*'

jobs:
  deploy-pwa:
    name: Deploy PWA
    # Trigger on successful Garnix check_suite on main branch
    if: |
      (github.event_name == 'check_suite' && 
       github.event.check_suite.app.name == 'Garnix' && 
       github.event.check_suite.conclusion == 'success' && 
       github.event.check_suite.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.check_suite.head_sha }}
      - uses: determinate-systems/nix-installer-action@v16
      - uses: determinate-systems/magic-nix-cache-action@v11

      - name: Build Web
        run: nix build .#web -o public-dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-dist
          cname: logout.guilhemfau.re

  release-android:
    name: Release Android
    # Trigger on successful Garnix check_suite on main OR on a tag push
    if: |
      (github.event_name == 'check_suite' && 
       github.event.check_suite.app.name == 'Garnix' && 
       github.event.check_suite.conclusion == 'success' && 
       github.event.check_suite.head_branch == 'main') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the check_suite SHA or the tag ref
          ref: ${{ github.event.check_suite.head_sha || github.ref }}
      - uses: determinate-systems/nix-installer-action@v16
      - uses: determinate-systems/magic-nix-cache-action@v11

      # No need to wait for Garnix because either check_suite is completed 
      # or it's a tag where we don't mind the build time as much (or we assume Garnix built it)
      - name: Build Android
        run: nix build .#android -o android-dist

      - name: Sign APK
        env:
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'logout-key' }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/secrets
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/secrets/logout.jks
          APK_SRC=$(find android-dist -name "*.apk" | head -n 1)
          cp "$APK_SRC" logout.apk
          nix develop -c ./scripts/android-sign.sh logout.apk

      - name: Rolling Release
        if: github.event_name == 'check_suite'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TAG="rolling-$DATE"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Rolling release for $DATE already exists. Skipping."
          else
            gh release list --limit 100 | grep "rolling-" | while read -r line; do
              OLD_TAG=$(echo "$line" | awk '{print $1}')
              OLD_DATE=${OLD_TAG#rolling-}
              if [ "$(date -d "$OLD_DATE" +%s)" -lt "$(date -d "7 days ago" +%s)" ]; then
                 gh release delete "$OLD_TAG" --yes --cleanup-tag
              fi
            done
            gh release create "$TAG" "logout.apk" --title "Rolling $DATE" --notes "Automated rolling release for $DATE" --prerelease
          fi

      - name: Stable Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release create "$TAG" "logout.apk" --title "LogOut $TAG" --notes "Release $TAG"
