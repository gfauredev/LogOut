name: CD

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-web:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (contains(github.event.head_commit.message, 'feat') || contains(github.event.head_commit.message, 'fix'))) || github.event_name == 'release'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: "pages"
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
            lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: swatinem/rust-cache@v2
      - name: Install Dioxus CLI
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli
      - name: Build Web
        run: dx build --release --platform web --base-path /LogOut
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./target/dx/log-out/release/web/public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-android:
    name: Build Android arm64
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (contains(github.event.head_commit.message, 'feat') || contains(github.event.head_commit.message, 'fix'))) || github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: swatinem/rust-cache@v2
      - name: Install Dioxus CLI
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli

      - name: Decode Keystore
        run: |
          mkdir -p android/secrets
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android/secrets/logout.jks

      - name: Build Android (Project Prep)
        run: >-
          dx build
          --platform android
          --release
          --no-default-features
          --features mobile-platform

      - name: Fix Icons and Rebuild APK
        run: |
          chmod +x scripts/android-icon.sh
          ./scripts/android-icon.sh

      - name: Sign APK
        env:
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PATH: "android/secrets/logout.jks"
        run: |
          chmod +x scripts/android-sign.sh
          APK_FILE=$(find target/dx/log-out/release/android/ -name "*release-unsigned.apk" | head -n 1)
          if [ -z "$APK_FILE" ]; then
            APK_FILE=$(find target/dx/log-out/release/android/ -name "*.apk" | head -n 1)
          fi
          if [ -z "$APK_FILE" ]; then
            echo "::error::No APK found"
            exit 1
          fi
          ./scripts/android-sign.sh "$APK_FILE"
          cp "$APK_FILE" logout-android-arm64.apk

      - name: Build and Sign AAB
        env:
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # AAB will use the fixed icons from the previous step
          GRADLE_W=$(find target/dx/log-out/release/android/ -name "gradlew" | head -n 1)
          GRADLE_DIR=$(dirname "$GRADLE_W")
          cd "$GRADLE_DIR"
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/secrets/logout.jks" \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASS" \
            -Pandroid.injected.signing.key.alias="logout-key" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASS"
          AAB_FILE=$(find . -name "*.aab" | head -n 1)
          if [ -z "$AAB_FILE" ]; then
            echo "::error::No AAB found"
            exit 1
          fi
          cp "$AAB_FILE" "$GITHUB_WORKSPACE/logout-android-arm64.aab"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64
          path: |
            logout-android-arm64.apk
            logout-android-arm64.aab

      - name: Publish to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            logout-android-arm64.apk
            logout-android-arm64.aab

      - name: Update Latest Rolling Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="latest-android"
          NOTES="Latest arm64 builds from main branch.\n\n- [logout-android-arm64.apk](https://github.com/${{ github.repository }}/releases/download/$TAG/logout-android-arm64.apk)\n- [logout-android-arm64.aab](https://github.com/${{ github.repository }}/releases/download/$TAG/logout-android-arm64.aab)"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" logout-android-arm64.apk logout-android-arm64.aab --clobber
            gh release edit "$TAG" --notes "$NOTES"
          else
            gh release create "$TAG" logout-android-arm64.apk logout-android-arm64.aab --prerelease --title "Latest Android Build (arm64)" --notes "$NOTES"
          fi
