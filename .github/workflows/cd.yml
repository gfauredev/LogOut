name: CD

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-web:
    name: Deploy to GitHub Pages
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: "pages"
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
            lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: swatinem/rust-cache@v2
      - name: Install Dioxus CLI
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli
      - name: Build Web
        run: dx build --release --platform web --base-path /LogOut
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./target/dx/log-out/release/web/public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-android:
    name: Build Android arm64
    permissions:
      contents: write
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: swatinem/rust-cache@v2
      - name: Install Dioxus CLI
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli

      - name: Decode Keystore
        run: |
          mkdir -p android/secrets
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android/secrets/logout.jks

      - name: Build Android (Project Prep)
        run: >-
          dx build
          --platform android
          --release
          --no-default-features
          --features mobile-platform

      - name: Fix Icons and Rebuild APK
        run: |
          chmod +x scripts/android-icon.sh
          ./scripts/android-icon.sh

      - name: Sign APK
        env:
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PATH: "android/secrets/logout.jks"
        run: |
          chmod +x scripts/android-sign.sh
          APK_FILE=$(find target/dx/log-out/release/android/ -name "*release-unsigned.apk" | head -n 1)
          if [ -z "$APK_FILE" ]; then
            APK_FILE=$(find target/dx/log-out/release/android/ -name "*.apk" | head -n 1)
          fi
          if [ -z "$APK_FILE" ]; then
            echo "::error::No APK found"
            exit 1
          fi
          ./scripts/android-sign.sh "$APK_FILE"
          cp "$APK_FILE" logout-android-arm64.apk

      - name: Manage Rolling Tag
        if: github.event_name != 'release'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest-android
          git push -f origin latest-android

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || 'latest-android' }}
          name: ${{ github.event_name == 'release' && github.event.release.name || 'Latest Android Build (arm64)' }}
          body: ${{ github.event_name == 'release' && github.event.release.body || 'Latest arm64 builds from main branch.' }}
          prerelease: true
          files: logout-android-arm64.apk
