name: CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  deploy-pwa:
    name: Deploy PWA
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      checks: read
      statuses: read
    steps:
      - uses: actions/checkout@v4
      - name: Wait for Garnix flake.nix evaluation
        uses: lewagon/wait-on-check-action@v1.5.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          check-regexp: 'Evaluate flake.nix'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 40
      - name: Wait for Garnix Web package
        uses: lewagon/wait-on-check-action@v1.5.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          check-regexp: 'package web.*'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
          fail-on-no-checks: false
      - uses: cachix/install-nix-action@v31.10.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
      - uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Build Web
        run: nix build .#web -o public-dist
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public-dist
          cname: logout.guilhemfau.re

  release-android:
    name: Release Android
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      checks: read
      statuses: read
    steps:
      - uses: actions/checkout@v4
      - name: Wait for Garnix flake.nix evaluation
        uses: lewagon/wait-on-check-action@v1.5.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          check-regexp: 'Evaluate flake.nix'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 40
      - name: Wait for Garnix Web package
        uses: lewagon/wait-on-check-action@v1.5.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          check-regexp: 'devShell.*'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
          fail-on-no-checks: false
      - uses: cachix/install-nix-action@v31.10.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
      - uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Build Android
        run: nix build .#android -o android-dist
      - name: Sign APK
        env:
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'logout-key' }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/secrets
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/secrets/logout.jks
          APK_SRC=$(find android-dist -name "*.apk" | head -n 1)
          cp "$APK_SRC" logout.apk
          nix develop -c ./scripts/android-sign.sh logout.apk

      - name: Rolling Release
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TAG="rolling-$DATE"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Rolling release for $DATE already exists. Skipping."
          else
            gh release list --limit 100 | grep "rolling-" | while read -r line; do
              OLD_TAG=$(echo "$line" | awk '{print $1}')
              OLD_DATE=${OLD_TAG#rolling-}
              if [ "$(date -d "$OLD_DATE" +%s)" -lt "$(date -d "7 days ago" +%s)" ]; then
                 gh release delete "$OLD_TAG" --yes --cleanup-tag
              fi
            done
            gh release create "$TAG" "logout.apk" --title "Rolling $DATE" --notes "Automated rolling release for $DATE" --prerelease
          fi

      - name: Stable Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release create "$TAG" "logout.apk" --title "LogOut $TAG" --notes "Release $TAG"
