name: CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths-ignore:
      - "**.md"
      - .git*
      - LICENSE
      - garnix.yml
      - .envrc
  schedule:
    - cron: '0 0 * * *'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-changes:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for changes and avoid spamming
        id: check
        run: |
          # If it's a tag or a manual dispatch, always proceed
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check if a release was already made today (UTC)
          TODAY=$(date -u +%Y%m%d)
          LATEST_TODAY=$(git tag -l "nightly-$TODAY-*" | head -n 1)
          
          if [ -n "$LATEST_TODAY" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "A nightly release for today ($TODAY) already exists. Skipping to avoid spamming."
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Support both the legacy "nightly" tag and the new timestamped "nightly-*" tags
            LATEST_NIGHTLY=$(git tag -l "nightly" "nightly-*" | sort -r | head -n 1)
            if [ -n "$LATEST_NIGHTLY" ]; then
              TAG_SHA=$(git rev-parse "$LATEST_NIGHTLY")
              CURRENT_SHA=$(git rev-parse HEAD)
              if [ "$TAG_SHA" = "$CURRENT_SHA" ]; then
                echo "No changes since last nightly build. Skipping."
                echo "changed=false" >> $GITHUB_OUTPUT
              else
                echo "Changes detected since last nightly build."
                echo "changed=true" >> $GITHUB_OUTPUT
              fi
            else
              echo "No nightly tag found. Proceeding with build."
              echo "changed=true" >> $GITHUB_OUTPUT
            fi
          else
            # For pushes to main, we always want to build if no release today
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  cleanup-old-nightlies:
    name: Clean up old nightly releases
    needs: check-changes
    # Only run for nightly/scheduled builds, not for tagged version releases
    if: |
      needs.check-changes.outputs.changed == 'true' &&
      github.event_name != 'release' &&
      !startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Delete stale nightly releases and tags
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = Date.now();
            const twelveHoursMs = 12 * 60 * 60 * 1000;
            const sevenDaysMs = 7 * 24 * 60 * 60 * 1000;

            const releases = await github.paginate(
              github.rest.repos.listReleases,
              { owner: context.repo.owner, repo: context.repo.repo }
            );

            for (const release of releases) {
              if (!release.tag_name.startsWith('nightly-') && release.tag_name !== 'nightly') continue;
              const age = now - new Date(release.created_at).getTime();
              if (age >= twelveHoursMs && age <= sevenDaysMs) continue;

              console.log(`Deleting nightly release: ${release.tag_name} (age: ${Math.round(age / 3600000)}h)`);
              try {
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id,
                });
              } catch (e) {
                console.log(`Failed to delete release ${release.tag_name}: ${e.message}`);
              }
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${release.tag_name}`,
                });
              } catch (e) {
                console.log(`Failed to delete tag ${release.tag_name}: ${e.message}`);
              }
            }

  deploy-web:
    name: Deploy to GitHub Pages
    needs: check-changes
    if: needs.check-changes.outputs.changed == 'true' && (github.event_name != 'push' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      pages: write
      id-token: write
      actions: read
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: "pages"
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
            lfs: true
      - name: Find CI build artifact for current source
        id: ci-artifact
        uses: actions/github-script@v7
        env:
          ARTIFACT_NAME: web-deploy-${{ hashFiles('Cargo.lock', 'src/**', 'assets/**', 'index.html', 'Dioxus.toml') }}
        with:
          script: |
            const artifactName = process.env.ARTIFACT_NAME;
            const { data } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: artifactName,
              per_page: 1,
            });
            if (data.total_count > 0 && !data.artifacts[0].expired) {
              core.setOutput('artifact-id', String(data.artifacts[0].id));
              core.setOutput('found', 'true');
              console.log(`Found CI artifact: ${artifactName} (id: ${data.artifacts[0].id})`);
            } else {
              core.setOutput('found', 'false');
              console.log(`No CI artifact found for: ${artifactName}, will rebuild`);
            }
      - name: Download CI web build
        if: steps.ci-artifact.outputs.found == 'true'
        uses: actions/download-artifact@v4
        with:
          artifact-id: ${{ steps.ci-artifact.outputs.artifact-id }}
          path: ./target/dx/log-out/release/web/public
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        if: steps.ci-artifact.outputs.found != 'true'
        with:
          targets: wasm32-unknown-unknown
      - uses: swatinem/rust-cache@v2
        if: steps.ci-artifact.outputs.found != 'true'
      - name: Install Dioxus CLI
        if: steps.ci-artifact.outputs.found != 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli
      - name: Build Web
        if: steps.ci-artifact.outputs.found != 'true'
        run: dx build --release --platform web --base-path /LogOut
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./target/dx/log-out/release/web/public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-android:
    name: Build Android arm64
    needs: [check-changes, cleanup-old-nightlies]
    if: |
      always() &&
      needs.check-changes.outputs.changed == 'true' &&
      (github.event_name != 'push' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) &&
      (needs.cleanup-old-nightlies.result == 'success' || needs.cleanup-old-nightlies.result == 'skipped')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android
      - uses: swatinem/rust-cache@v2
      - name: Install Dioxus CLI
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli

      - name: Decode Keystore
        run: |
          mkdir -p android/secrets
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android/secrets/logout.jks

      - name: Build Android (Project Prep)
        run: >-
          dx build
          --platform android
          --release
          --no-default-features
          --features mobile-platform

      - name: Fix Icons and Rebuild APK
        run: |
          chmod +x scripts/android-icon.sh
          ./scripts/android-icon.sh

      - name: Sign APK
        env:
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PATH: "android/secrets/logout.jks"
        run: |
          chmod +x scripts/android-sign.sh
          APK_FILE=$(find target/dx/log-out/release/android/ -name "*release-unsigned.apk" | head -n 1)
          if [ -z "$APK_FILE" ]; then
            APK_FILE=$(find target/dx/log-out/release/android/ -name "*.apk" | head -n 1)
          fi
          if [ -z "$APK_FILE" ]; then
            echo "::error::No APK found"
            exit 1
          fi
          ./scripts/android-sign.sh "$APK_FILE"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          if [ "${{ github.event_name }}" = "release" ] || [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            NIGHTLY_TAG="${{ github.ref_name }}"
            FILENAME="logout-android-arm64-$SHORT_SHA.apk"
          else
            TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
            NIGHTLY_TAG="nightly-$TIMESTAMP-$SHORT_SHA"
            FILENAME="logout-android-arm64-nightly-$TIMESTAMP-$SHORT_SHA.apk"
          fi
          cp "$APK_FILE" "$FILENAME"
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          echo "NIGHTLY_TAG=$NIGHTLY_TAG" >> $GITHUB_ENV
          echo "RELEASE_FILENAME=$FILENAME" >> $GITHUB_ENV

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NIGHTLY_TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ (github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')) && (github.event.release.name || github.ref_name) || 'Nightly Build' }}
          body: ${{ (github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')) && github.event.release.body || 'Automated nightly build from the latest main branch.' }}
          prerelease: ${{ !(github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')) }}
          files: ${{ env.RELEASE_FILENAME }}
          generate_release_notes: ${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') }}
          make_latest: ${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') }}
