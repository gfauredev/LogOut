name: Nightly Deep Checks

on:
  schedule:
    - cron: '0 2 * * *' # 2:00 AM UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-deny:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  cargo-mutants:
    name: Mutation Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - name: Install cargo-mutants
        run: cargo install cargo-mutants
      - name: Run mutants
        # Only run for 1 hour to avoid excessive GHA usage, or use --timeout if supported
        # README mentions it so we should run it.
        # We can limit the number of mutants or the time.
        run: |
          cargo mutants --no-times --timeout 300 || true
      - name: Upload mutants report
        uses: actions/upload-artifact@v7
        with:
          name: mutants-report
          path: mutants.out
          if-no-files-found: ignore

  report:
    name: Nightly Report
    needs: [cargo-deny, cargo-mutants]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Summarize Results
        uses: actions/github-script@v7
        with:
          script: |
            const denyResult = "${{ needs.cargo-deny.result }}";
            const mutantsResult = "${{ needs.cargo-mutants.result }}";
            const tag = 'Nightly Deep Checks Report';
            
            let body = `## 🌑 ${tag}\n\n`;
            body += `| Check | Status |\n`;
            body += `|-------|--------|\n`;
            body += `| Dependency Audit (cargo-deny) | ${denyResult === 'success' ? '✅' : '❌'} |\n`;
            body += `| Mutation Testing (cargo-mutants) | ${mutantsResult === 'success' ? '✅' : (mutantsResult === 'skipped' ? '⏭️' : '⚠️')} |\n\n`;
            
            if (denyResult !== 'success') {
              body += `❌ **Dependency Audit failed.** Please check the [workflow run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) for details.\n\n`;
            }
            
            if (mutantsResult !== 'success' && mutantsResult !== 'skipped') {
              body += `⚠️ **Mutation testing completed with issues or survived mutants.**\n\n`;
            }
            
            // Create or update a "Nightly Status" issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['nightly-report'],
            });
            
            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🌑 Nightly Deep Checks Report',
                body,
                labels: ['nightly-report'],
              });
            }
