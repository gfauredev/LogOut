on:
  schedule:
    - cron: '0 2 * * *' # 2:00 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  cargo-deny:
    name: Dependency Audit (cargo-deny)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31.10.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Run cargo-deny
        run: nix develop -c cargo deny check

  cargo-mutants:
    name: Mutation Testing (cargo-mutants)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Needed to check for previous commits

      - name: Check for recent changes
        id: check_changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "SKIP=false" >> $GITHUB_OUTPUT
            echo "Manual trigger, forcing run."
          elif [ -z "$(git log --since='24 hours ago' --oneline)" ]; then
            echo "SKIP=true" >> $GITHUB_OUTPUT
            echo "No changes in the last 24 hours, skipping."
          else
            echo "SKIP=false" >> $GITHUB_OUTPUT
            echo "Changes detected, proceeding with mutation testing."
          fi

      - if: steps.check_changes.outputs.SKIP != 'true'
        uses: cachix/install-nix-action@v31.10.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
      - if: steps.check_changes.outputs.SKIP != 'true'
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Run cargo-mutants
        if: steps.check_changes.outputs.SKIP != 'true'
        run: |
          # Mutants focus on core logic, excluding UI components
          nix develop -c cargo mutants --no-shuffle -v --timeout 300 \
            --exclude "src/components/*"

  e2e-android:
    name: Android End-to-End (Maestro)
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31.10.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build Android APK
        run: nix build .#android -o android-dist

      - name: Run Android E2E
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: |
            APK=$(find android-dist -name "*.apk" | head -n 1)
            adb install "$APK"
            nix develop -c maestro test maestro/android/launch.yaml

      - name: Upload Maestro Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-android-report
          path: ~/.maestro/tests/
