on:
  schedule:
    - cron: '0 2 * * *' # 2:00 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  update-deps:
    name: Update Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31.10.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
      - uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Update flake inputs
        run: nix flake update
      - name: Update Cargo dependencies
        run: nix develop -c cargo update
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore: update flake.lock and Cargo.lock'
          title: 'chore: nightly dependency updates'
          body: Automated nightly update of Nix flake inputs and Cargo dependencies.
          branch: nightly/update-deps
          delete-branch: true

  cargo-deny:
    name: Dependency Audit (cargo-deny)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31.10.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Run cargo-deny
        run: nix develop -c cargo deny check

  cargo-mutants:
    name: Mutation Testing (cargo-mutants)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Needed to check for previous commits

      - name: Check for recent changes
        id: check_changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "SKIP=false" >> $GITHUB_OUTPUT
            echo "Manual trigger, forcing run."
          elif [ -z "$(git log --since='24 hours ago' --oneline)" ]; then
            echo "SKIP=true" >> $GITHUB_OUTPUT
            echo "No changes in the last 24 hours, skipping."
          else
            echo "SKIP=false" >> $GITHUB_OUTPUT
            echo "Changes detected, proceeding with mutation testing."
          fi

      - if: steps.check_changes.outputs.SKIP != 'true'
        uses: cachix/install-nix-action@v31.10.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
      - if: steps.check_changes.outputs.SKIP != 'true'
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Run cargo-mutants
        if: steps.check_changes.outputs.SKIP != 'true'
        run: | # Mutants focus on core logic, excluding UI components
          nix develop -c cargo mutants --no-shuffle -v --timeout 300 \
            --exclude "src/components/*"

