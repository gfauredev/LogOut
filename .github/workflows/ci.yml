name: CI

on:
  pull_request:
  push:
    branches:
      - main
  repository_dispatch:
    types: [garnix_finished]

jobs:
  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use the SHA from the dispatch payload if available
          ref: ${{ github.event.client_payload.sha || github.sha }}
      - uses: cachix/install-nix-action@v31.10.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=

      - name: Run Coverage Gate
        run: |
          nix develop -c cargo llvm-cov --bin log-out \
            --ignore-filename-regex "src/components/" \
            --fail-under-functions 90 \
            --fail-under-lines 80 \
            --show-missing-lines

      - name: Get Coverage Output
        if: always() && (github.event_name == 'pull_request' || github.event.client_payload.pr_number)
        id: coverage_report
        run: |
          REPORT=$(nix develop -c cargo llvm-cov --bin log-out --ignore-filename-regex "src/components/")
          echo "REPORT<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Coverage Comment
        if: always() && (github.event_name == 'pull_request' || github.event.client_payload.pr_number)
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number || github.event.client_payload.pr_number }}
          body: |
            ### 📊 Coverage Report (Excluding Components)
            ```text
            ${{ steps.coverage_report.outputs.REPORT }}
            ```

  lighthouse:
    name: PageSpeed Lighthouse
    needs: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha || github.sha }}
      - uses: cachix/install-nix-action@v31.10.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=

      - name: Build Web
        run: nix build .#web -o public-dist

      - name: Lighthouse Audit
        id: lighthouse_audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: .lighthouserc.json
        env:
          LHCI_COLLECT_STATIC_DIST_DIR: ./public-dist

      - name: Post Lighthouse Comment
        if: github.event_name == 'pull_request' || github.event.client_payload.pr_number
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number || github.event.client_payload.pr_number }}
          body: |
            ### 🚀 Lighthouse Audit
            Check out the [full report here](${{ steps.lighthouse_audit.outputs.links }})

  e2e-web:
    name: Web End-to-End (Maestro)
    needs: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha || github.sha }}
      - uses: cachix/install-nix-action@v31.10.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=

      - name: Build and Serve
        run: |
          nix build .#web -o public-dist
          cd public-dist && python3 -m http.server 8080 &
          sleep 2

      - name: Run Maestro Web Tests
        run: |
          nix develop -c maestro test maestro/web

      - name: Upload Maestro Screenshots to Cloudinary
        if: failure() && (github.event_name == 'pull_request' || github.event.client_payload.pr_number)
        id: upload_screenshots
        env:
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
        run: |
          REPORT_BODY="### ❌ Maestro Web E2E Failures\n"
          # Find all screenshots in maestro report dir
          find ~/.maestro/tests/ -name "*.png" | while read -r img; do
            echo "Uploading $img to Cloudinary..."
            # Simple curl to Cloudinary API using CLOUDINARY_URL (which contains credentials)
            # Or use a signed/unsigned upload if CLOUDINARY_URL is not enough.
            # Assuming CLOUDINARY_URL format: cloudinary://API_KEY:API_SECRET@CLOUD_NAME
            # Extract parts:
            CREDS=$(echo "$CLOUDINARY_URL" | cut -d'@' -f1 | cut -d':' -f2-)
            CLOUD_NAME=$(echo "$CLOUDINARY_URL" | cut -d'@' -f2)
            
            UPLOAD_URL="https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload"
            # Unsigned requires a preset. If the user only has CLOUDINARY_URL, they might want signed.
            # Let's try to find an upload preset from secrets or use a generic one if allowed.
            PRESET=${{ secrets.CLOUDINARY_UPLOAD_PRESET || 'ml_default' }}
            
            RESULT=$(curl -s -X POST "$UPLOAD_URL" \
              -F "file=@$img" \
              -F "upload_preset=$PRESET")
            
            IMG_URL=$(echo "$RESULT" | jq -r '.secure_url')
            REPORT_BODY="${REPORT_BODY}\n- ![Screenshot]($IMG_URL)"
          done
          echo "REPORT_BODY<<EOF" >> $GITHUB_OUTPUT
          echo -e "$REPORT_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post E2E Failure Comment
        if: failure() && (github.event_name == 'pull_request' || github.event.client_payload.pr_number)
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number || github.event.client_payload.pr_number }}
          body: ${{ steps.upload_screenshots.outputs.REPORT_BODY }}

      - name: Upload Maestro Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-web-report
          path: ~/.maestro/tests/
