on:
  pull_request:
  push:
    branches:
      - main

jobs:
  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Wait for Garnix
        uses: lewagon/wait-on-check-action@v1.5.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          check-regexp: '.*Garnix.*'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 20
      - uses: cachix/install-nix-action@v31.10.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
      - uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Fetch Coverage from Garnix
        run: |
          nix build .#checks.x86_64-linux.coverage -o coverage-result
      - name: Process Coverage Report
        id: coverage_report
        run: |
          REPORT=$(cat coverage-result/coverage.txt)
          PERCENT=$(jq '.data[0].totals.lines.percent' coverage-result/coverage.json)
          echo "REPORT<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "PERCENT=$PERCENT" >> $GITHUB_OUTPUT
          echo "Coverage is $PERCENT%"
          if (( $(echo "$PERCENT < 80" | bc -l) )); then
            echo "❌ Coverage below 80%"
            # Store failure state for step later
            echo "FAILED=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Coverage above 80%"
          fi

      - name: Post Coverage Comment
        if: always() && github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### 📊 Coverage Report (from Garnix)
            **Total Line Coverage: ${{ steps.coverage_report.outputs.PERCENT }}%**
            
            ```text
            ${{ steps.coverage_report.outputs.REPORT }}
            ```

      - name: Check Coverage Threshold
        run: |
          if [ "${{ steps.coverage_report.outputs.FAILED }}" == "true" ]; then
            exit 1
          fi

  lighthouse:
    name: PageSpeed Lighthouse
    needs: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31.10.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
      - uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Build Web
        run: nix build .#web -o public-dist
      - name: Lighthouse Audit
        id: lighthouse_audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: .lighthouserc.json
        env:
          LHCI_COLLECT_STATIC_DIST_DIR: ./public-dist

      - name: Post Lighthouse Comment
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### 🚀 Lighthouse Audit
            Check out the [full report here](${{ steps.lighthouse_audit.outputs.links }})

  e2e-web:
    name: Web End-to-End (Maestro)
    needs: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31.10.0
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
      - uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Build and Serve
        run: |
          nix build .#web -o public-dist
          cd public-dist && python3 -m http.server 8080 &
          sleep 2
            - name: Run Maestro Web Tests
              run: |
                set -o pipefail
                nix develop -c maestro test maestro/web |& tee maestro_console.log
            - name: Upload Maestro Screenshots to Cloudinary
              if: failure() && github.event_name == 'pull_request'
              id: upload_screenshots
              env:
                CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
                UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
              run: |
                REPORT_BODY="### ❌ Maestro Web E2E Failures\n"
                if [ -f maestro_console.log ]; then
                  # Use sed to strip ANSI escape codes for cleaner markdown
                  CLEAN_LOG=$(sed 's/\x1b\[[0-9;]*[mG]//g' maestro_console.log | tail -n 100)
                  REPORT_BODY="${REPORT_BODY}\n<details>\n<summary>📜 Maestro Console Output (Last 100 lines)</summary>\n\n\`\`\`text\n${CLEAN_LOG}\n\`\`\`\n</details>\n"
                fi
                if [ -n "$CLOUD_NAME" ] && [ -n "$UPLOAD_PRESET" ]; then
                  REPORT_BODY="${REPORT_BODY}\n#### 📸 Screenshots\n"
                  find ~/.maestro/tests/ -name "*.png" | while read -r img; do
                    echo "Uploading $img to Cloudinary (unsigned)..."
                    UPLOAD_URL="https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload"
                    RESULT=$(curl -s -X POST "$UPLOAD_URL" -F "file=@$img" -F "upload_preset=$UPLOAD_PRESET")
                    IMG_URL=$(echo "$RESULT" | jq -r '.secure_url')
                    if [ "$IMG_URL" != "null" ]; then
                      REPORT_BODY="${REPORT_BODY}\n- ![Screenshot]($IMG_URL)"
                    fi
                  done
                fi
                echo "REPORT_BODY<<EOF" >> $GITHUB_OUTPUT
                echo -e "$REPORT_BODY" >> $GITHUB_OUTPUT
                echo "EOF" >> $GITHUB_OUTPUT
      - name: Post E2E Failure Comment
        if: failure() && github.event_name == 'pull_request' && steps.upload_screenshots.outputs.REPORT_BODY != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.upload_screenshots.outputs.REPORT_BODY }}
      - name: Upload Maestro Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-web-report
          path: ~/.maestro/tests/
