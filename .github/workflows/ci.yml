name: CI # Code Quality Gates

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  format:
    name: Check Formatting (cargo fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: Lint (cargo clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2

      - name: Run Clippy (deny warnings)
        run: cargo clippy -- -D warnings

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: swatinem/rust-cache@v2

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run unit tests with coverage
        id: tests
        run: |
          # Use tee so the output is always written to a file regardless of exit code.
          # set +e prevents errexit from aborting the script when cargo returns non-zero
          # (i.e. when one or more tests fail); PIPESTATUS[0] captures cargo's exit code
          # (the first command in the pipe) rather than tee's.
          set +e
          cargo llvm-cov --bin log-workout --json --output-path coverage.json 2>&1 \
            | tee /tmp/test_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          # Strip Cargo compilation/progress lines; keep only test results.
          # || true prevents grep from exiting 1 when all lines are filtered out.
          CLEAN_OUTPUT=$(grep -Ev '^\s*(Compiling|Checking|Finished|Downloaded|Downloading|Updating|Locking|Fresh)' \
            /tmp/test_output.txt || true)
          echo "test_output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CLEAN_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      # Upload even when tests fail so coverage-gate can still download and report.
      - name: Upload coverage JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-json
          path: coverage.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Post unit test results comment
        if: always()
        uses: actions/github-script@v7
        env:
          TEST_OUTPUT: ${{ steps.tests.outputs.test_output }}
          TEST_OUTCOME: ${{ steps.tests.outcome }}
        with:
          script: |
            const output = process.env.TEST_OUTPUT || '(no output captured)';
            const passed = process.env.TEST_OUTCOME === 'success';
            const status = passed ? '✅ **PASSED**' : '❌ **FAILED**';
            const tag = '<!-- unit-tests -->';
            const body = `${tag}\n## 🧪 Unit Tests ${status}\n\n\`\`\`\n${output}\n\`\`\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(tag));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  coverage-gate:
    name: Coverage Gate (≥ 90%)
    needs: unit-tests
    # Run even when unit-tests fails so we can post a "skipped" comment to the PR.
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # continue-on-error so the job doesn't abort when unit-tests failed and
      # never uploaded the artifact.
      - name: Download coverage JSON report
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage-json

      - name: Generate coverage summary
        id: cov
        if: steps.download.outcome == 'success'
        run: |
          TOTAL_COVERED=$(jq '.data[0].totals.lines.covered' coverage.json)
          TOTAL_COUNT=$(jq '.data[0].totals.lines.count' coverage.json)
          TOTAL_PCT=$(jq '.data[0].totals.lines.percent | floor' coverage.json)
          SUMMARY="Total: ${TOTAL_COVERED}/${TOTAL_COUNT} lines covered (${TOTAL_PCT}%)"
          echo "$SUMMARY"
          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Check coverage gate for tested files
        id: gate
        if: steps.download.outcome == 'success'
        run: |
          # Files that contain unit tests (have #[cfg(test)] blocks)
          TESTED_FILES=$(grep -rl '#\[cfg(test)\]' src/ | sort)
          echo "Tested files:"
          echo "$TESTED_FILES"

          FAIL=0
          GATE_REPORT=""
          for f in $TESTED_FILES; do
            # Use jq -rc + first() to get a single compact JSON line.
            # The old pattern (pretty-print | head -1) only captured "{", breaking
            # subsequent jq calls and silently skipping every coverage check.
            # The fallback // {...} handles files absent from the coverage report.
            FILE_DATA=$(jq -rc --arg f "$f" '
              first(
                .data[0].files[]
                | select(.filename | endswith($f))
                | {covered: .summary.lines.covered, count: .summary.lines.count, pct: (.summary.lines.percent | floor)}
              ) // {covered: 0, count: 0, pct: 0}
            ' coverage.json)

            LH=$(echo "$FILE_DATA" | jq -r '.covered')
            LF=$(echo "$FILE_DATA" | jq -r '.count')
            PCT=$(echo "$FILE_DATA" | jq -r '.pct')

            STATUS="✅"
            if [ "$LF" -eq 0 ]; then
              # File has no instrumented lines in the coverage report – skip the gate.
              STATUS="➖"
            elif [ "$PCT" -lt 90 ]; then
              STATUS="❌"
              FAIL=1
            fi
            GATE_REPORT="${GATE_REPORT}| ${f} | ${LH}/${LF} | ${PCT}% | ${STATUS} |\n"
            echo "$f: $LH/$LF lines covered ($PCT%)"
          done

          echo "gate_report<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$GATE_REPORT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "gate_failed=$FAIL" >> "$GITHUB_OUTPUT"

      - name: Post coverage comment
        if: always()
        uses: actions/github-script@v7
        env:
          UNIT_TESTS_RESULT: ${{ needs.unit-tests.result }}
          SUMMARY: ${{ steps.cov.outputs.summary }}
          GATE_REPORT: ${{ steps.gate.outputs.gate_report }}
          GATE_FAILED: ${{ steps.gate.outputs.gate_failed }}
        with:
          script: |
            const unitResult = process.env.UNIT_TESTS_RESULT;
            const summary = process.env.SUMMARY;
            const gateReport = process.env.GATE_REPORT;
            const gateFailed = process.env.GATE_FAILED === '1';
            const tag = '<!-- coverage-gate -->';
            let body;
            if (unitResult !== 'success' || !summary) {
              body = `${tag}\n## 📊 Coverage Gate ➖ **SKIPPED** — unit tests did not pass`;
            } else {
              const gateStatus = gateFailed
                ? '❌ **FAILED** — tested files must have ≥ 90% coverage'
                : '✅ **PASSED** — all tested files have ≥ 90% coverage';
              body = `${tag}
## 📊 Coverage Gate ${gateStatus}

### Coverage Summary
\`\`\`
${summary}
\`\`\`

### Per-file Results
| File | Lines Hit/Total | Coverage | Status |
|------|----------------|----------|--------|
${gateReport}`;
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(tag));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if coverage gate not met
        if: steps.gate.outputs.gate_failed == '1'
        run: |
          echo "::error::Coverage gate failed: one or more tested files have less than 90% line coverage."
          exit 1

  e2e-web:
    name: Web E2E Tests (Maestro)
    needs: [format, clippy, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: swatinem/rust-cache@v2

      - name: Install Dioxus CLI
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli

      - name: Build web release
        run: dx build --web --release

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Serve PWA and run Maestro web tests
        id: maestro
        continue-on-error: true
        run: |
          dx serve --open false --interactive false --web --release &
          SERVER_PID=$!
          sleep 5 # Wait for the server to be ready
          # Use tee so output is available to the post-comment step.
          # set +e prevents errexit from aborting before we capture exit code and kill the server.
          set +e
          maestro test --headless maestro/web/ 2>&1 | tee /tmp/maestro_output.txt
          TEST_EXIT=${PIPESTATUS[0]}
          set -e
          kill $SERVER_PID 2>/dev/null || true
          echo "maestro_output<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/maestro_output.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          exit $TEST_EXIT

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-diagnostics
          path: ~/.maestro/tests/
          if-no-files-found: ignore
          retention-days: 7

      - name: Post E2E test results comment
        if: always()
        uses: actions/github-script@v7
        env:
          MAESTRO_OUTPUT: ${{ steps.maestro.outputs.maestro_output }}
          MAESTRO_OUTCOME: ${{ steps.maestro.outcome }}
        with:
          script: |
            const output = process.env.MAESTRO_OUTPUT || '(no output captured)';
            const passed = process.env.MAESTRO_OUTCOME === 'success';
            const status = passed ? '✅ **PASSED**' : '❌ **FAILED**';
            const tag = '<!-- e2e-web -->';
            const body = `${tag}\n## 🌐 Web E2E Tests ${status}\n\n\`\`\`\n${output}\n\`\`\``;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(tag));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if Maestro tests failed
        if: steps.maestro.outcome == 'failure'
        run: exit 1

