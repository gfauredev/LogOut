name: CI # Code Quality Gates

on:
  pull_request:
    paths-ignore:
      - "**.md"
      - .git*
      - LICENSE
      - garnix.yml
      - .envrc

permissions:
  contents: read

jobs:
  rebased-check:
    name: Check if rebased on ${{ github.base_ref }}
    runs-on: ubuntu-latest
    outputs:
      is-rebased: ${{ steps.check.outputs.is-rebased }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if branch is rebased
        id: check
        run: |
          git fetch origin "${{ github.base_ref }}"
          BASE_SHA=$(git rev-parse "origin/${{ github.base_ref }}")
          if git merge-base --is-ancestor "$BASE_SHA" HEAD; then
            echo "Branch is rebased on ${{ github.base_ref }}"
            echo "is-rebased=true" >> "$GITHUB_OUTPUT"
          else
            echo "Branch is NOT rebased on ${{ github.base_ref }}, skipping E2E tests"
            echo "is-rebased=false" >> "$GITHUB_OUTPUT"
          fi

  format:
    name: Formatting
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.check.outcome }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: swatinem/rust-cache@v2
      - name: Check formatting
        id: check
        continue-on-error: true
        run: cargo fmt --all -- --check

  clippy:
    name: Lint
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.lint.outcome }}
      warnings: ${{ steps.count.outputs.warnings }}
      details: ${{ steps.count.outputs.details }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
      - name: Run Clippy
        id: lint
        continue-on-error: true
        run: |
          cargo clippy --all-targets -- -D warnings -W clippy::all -W clippy::pedantic 2>&1 | tee clippy_output.txt
      - name: Count clippy warnings
        id: count
        if: always()
        run: |
          WARNINGS=$(grep -c "warning:" clippy_output.txt || true)
          echo "warnings=$WARNINGS" >> "$GITHUB_OUTPUT"
          echo "details<<EOF" >> "$GITHUB_OUTPUT"
          grep -E "^(error|warning):" clippy_output.txt | head -n 50 || true
          echo "EOF" >> "$GITHUB_OUTPUT"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.tests.outcome }}
      summary: ${{ steps.summarize.outputs.summary }}
      duration: ${{ steps.summarize.outputs.duration }}
      failures: ${{ steps.summarize.outputs.failures }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run unit tests with coverage
        id: tests
        run: |
          set -o pipefail
          cargo llvm-cov --lcov --output-path lcov.info 2>&1 | tee unit_test_output.txt
      - name: Summarize unit tests
        id: summarize
        run: |
          SUMMARY=$(grep -E "test result: .*\. [0-9]+ passed; [0-9]+ failed; [0-9]+ ignored" unit_test_output.txt | tail -n 1)
          if [ -z "$SUMMARY" ]; then
            SUMMARY="Unit tests failed before summary."
          fi
          DURATION=$(grep -E "finished in [0-9.]+s" unit_test_output.txt | tail -n 1 | grep -oE "[0-9.]+s" || echo "N/A")
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "duration=$DURATION" >> "$GITHUB_OUTPUT"
          echo "failures<<EOF" >> "$GITHUB_OUTPUT"
          sed -n '/^failures:$/,/^$/p' unit_test_output.txt | grep "^    " | sed 's/^    //' || true
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Upload lcov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-lcov
          path: lcov.info
          if-no-files-found: error
          retention-days: 7

  coverage-check:
    name: Coverage Gate
    needs: [unit-tests]
    if: always() && needs.unit-tests.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download lcov report
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage-lcov
      - name: Check coverage gate
        run: bash ./scripts/coverage-gate.sh

  e2e-web:
    name: Web E2E Tests
    needs: [rebased-check]
    if: needs.rebased-check.outputs.is-rebased == 'true'
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.maestro.outcome }}
      summary: ${{ steps.summarize.outputs.summary }}
      duration: ${{ steps.summarize.outputs.duration }}
      screenshots: ${{ steps.cloudinary.outputs.screenshots }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: swatinem/rust-cache@v2
      - name: Install Dioxus CLI
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli
      - name: Build web release
        run: dx build --web --release
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Serve PWA and run Maestro web tests
        id: maestro
        continue-on-error: true
        run: |
          dx serve --open false --interactive false --web --release &
          SERVER_PID=$!
          # Wait for server to be responsive
          timeout 60 bash -c 'until curl -sf http://localhost:8080 > /dev/null; do sleep 2; done' || (kill $SERVER_PID && exit 1)
          START_TIME=$(date +%s)
          maestro test --headless maestro/web/ | tee maestro_output.txt
          EXIT_CODE=$?
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "MAESTRO_DURATION=${DURATION}s" >> "$GITHUB_ENV"
          kill $SERVER_PID 2>/dev/null || true
          exit $EXIT_CODE
          
      - name: Summarize Maestro tests
        id: summarize
        run: |
          SUMMARY=$(grep -E "Tests passed: [0-9]+, Tests failed: [0-9]+" maestro_output.txt | tail -n 1)
          if [ -z "$SUMMARY" ]; then
             SUMMARY=$(grep -E "[0-9]+ passed, [0-9]+ failed" maestro_output.txt | tail -n 1)
          fi
          if [ -z "$SUMMARY" ]; then
            if [ "${{ steps.maestro.outcome }}" == "success" ]; then
              SUMMARY="✅ All Maestro tests passed"
            else
              SUMMARY="❌ Maestro tests failed"
            fi
          fi
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "duration=$MAESTRO_DURATION" >> "$GITHUB_OUTPUT"

      - name: Upload Screenshots to Cloudinary
        if: always() && steps.maestro.outcome == 'failure'
        id: cloudinary
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
        run: |
          SCREENSHOTS=$(find ~/.maestro/tests/ -name "*.png")
          REPORT=""
          if [ -n "$SCREENSHOTS" ]; then
            REPORT="#### 📸 Web E2E Failure Screenshots\n\n| Test | Screenshot |\n|------|------------|\n"
            for img in $SCREENSHOTS; do
              TEST_NAME=$(echo $img | awk -F'/' '{print $(NF-2)}')
              RES=$(curl -s -X POST "https://api.cloudinary.com/v1_1/$CLOUDINARY_CLOUD_NAME/image/upload" \
                -F "file=@$img" \
                -F "api_key=$CLOUDINARY_API_KEY" \
                -F "upload_preset=$CLOUDINARY_UPLOAD_PRESET" \
                -F "public_id=maestro_web_${{ github.run_id }}_${TEST_NAME}")
              URL=$(echo $RES | grep -oE '"secure_url":"[^"]+"' | head -n 1 | cut -d'"' -f4)
              if [ -n "$URL" ]; then
                REPORT="${REPORT}| ${TEST_NAME} | ![](${URL}) |\n"
              fi
            done
          fi
          echo "screenshots<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$REPORT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-diagnostics
          path: ~/.maestro/tests/
          if-no-files-found: ignore
          retention-days: 7

  build-release-web:
    name: Build Release Web
    needs: [format, clippy, unit-tests, e2e-web, rebased-check]
    if: |
      always() &&
      needs.format.outputs.outcome == 'success' &&
      needs.clippy.outputs.outcome == 'success' &&
      needs.unit-tests.result == 'success' &&
      needs.e2e-web.outputs.outcome == 'success' &&
      needs.rebased-check.outputs.is-rebased == 'true'
    permissions:
      contents: read
      actions: write
    runs-on: ubuntu-latest
    outputs:
      duration: ${{ steps.build.outputs.duration }}
      lighthouse_results: ${{ steps.lighthouse.outputs.manifest }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: swatinem/rust-cache@v2
      - name: Install Dioxus CLI
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli
      - name: Build web release
        id: build
        run: |
          START_TIME=$(date +%s)
          dx build --release --platform web --base-path /LogOut
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "duration=${DURATION}s" >> "$GITHUB_OUTPUT"
      - name: Audit with Lighthouse
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.lighthouserc.json
      - name: Upload web deployment build
        uses: actions/upload-artifact@v4
        with:
          name: web-deploy-${{ hashFiles('Cargo.lock', 'src/**', 'assets/**', 'index.html', 'Dioxus.toml') }}
          path: ./target/dx/log-out/release/web/public
          retention-days: 7
          overwrite: true

  report-quick:
    name: Quick PR Summary
    needs: [format, clippy, unit-tests, rebased-check, coverage-check]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Download lcov report
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage-lcov
          
      - name: Process Coverage
        id: cov
        run: |
          if [ -f lcov.info ]; then
            # Process lcov.info using perl for robust per-file extraction
            perl -ne '
              if (/^SF:(.+)/) { $sf = $1; $sf =~ s/.*\/src\//src\//; }
              elsif (/^LH:(\d+)/) { $lh = $1; }
              elsif (/^LF:(\d+)/) { $lf = $1; }
              elsif (/^FNH:(\d+)/) { $fnh = $1; }
              elsif (/^FNF:(\d+)/) { $fnf = $1; }
              elsif (/^end_of_record/) {
                $pct = $lf > 0 ? ($lh * 100 / $lf) : 0;
                $pct_f = sprintf("%.1f%%", $pct);
                $fpct = $fnf > 0 ? sprintf("%.1f%%", $fnh * 100 / $fnf) : "100%";
                $status = $pct >= 90 ? "✅" : "❌";
                print "REPORT:| $sf | $lh/$lf | $fnh/$fnf | $pct_f ($fpct) | $status |\n";
                $tlh += $lh; $tlf += $lf; $tfnh += $fnh; $tfnf += $fnf; $tfail = 1 if $pct < 90;
              }
              END {
                $tpct = $tlf > 0 ? ($tlh * 100 / $tlf) : 0;
                print "TOTAL:$tlh/$tlf,$tfnh/$tfnf,$tpct,$tfail\n";
              }
            ' lcov.info > cov_data.txt

            GATE_REPORT=$(grep "^REPORT:" cov_data.txt | sed 's/^REPORT://' | sort)
            TOTAL_DATA=$(grep "^TOTAL:" cov_data.txt | sed 's/^TOTAL://')
            IFS=',' read -r T_LINES T_FUNCS T_PCT T_FAIL <<< "$TOTAL_DATA"
            
            SUMMARY="Total: $T_LINES lines covered (${T_PCT}%), functions: $T_FUNCS"
            
            echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
            echo "gate_report<<EOF" >> "$GITHUB_OUTPUT"
            echo -e "$GATE_REPORT" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "gate_failed=$T_FAIL" >> "$GITHUB_OUTPUT"
            echo "has_coverage=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_coverage=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post/Update PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        env:
          FORMAT_STATUS: ${{ needs.format.outputs.outcome || needs.format.result }}
          CLIPPY_STATUS: ${{ needs.clippy.outputs.outcome || needs.clippy.result }}
          CLIPPY_WARNINGS: ${{ needs.clippy.outputs.warnings }}
          CLIPPY_DETAILS: ${{ needs.clippy.outputs.details }}
          UNIT_STATUS: ${{ needs.unit-tests.outputs.outcome || needs.unit-tests.result }}
          UNIT_SUMMARY: ${{ needs.unit-tests.outputs.summary }}
          UNIT_DURATION: ${{ needs.unit-tests.outputs.duration }}
          UNIT_FAILURES: ${{ needs.unit-tests.outputs.failures }}
          IS_REBASED: ${{ needs.rebased-check.outputs.is-rebased }}
          COV_SUMMARY: ${{ steps.cov.outputs.summary }}
          COV_GATE_REPORT: ${{ steps.cov.outputs.gate_report }}
          COV_GATE_FAILED: ${{ steps.cov.outputs.gate_failed }}
          HAS_COV: ${{ steps.cov.outputs.has_coverage }}
        with:
          script: |
            const isRebased = process.env.IS_REBASED === 'true';
            const getIcon = (outcome) => outcome === 'success' ? '✅' : (outcome === 'failure' ? '❌' : '⚠️');
            const tag = '<!-- ci-dashboard -->';
            
            let body = `${tag}\n## 📊 CI Dashboard\n\n`;
            
            body += `### 🛠️ Checks (Quick)\n`;
            body += `| Check | Status | Details |\n`;
            body += `|-------|--------|---------|\n`;
            body += `| Formatting | ${getIcon(process.env.FORMAT_STATUS)} | |\n`;
            const clippyWarns = process.env.CLIPPY_WARNINGS || '0';
            body += `| Linting | ${getIcon(process.env.CLIPPY_STATUS)} | ${clippyWarns} warnings |\n\n`;
            
            if (process.env.CLIPPY_DETAILS) {
              body += `#### 📝 Linting Issues\n\`\`\`\n${process.env.CLIPPY_DETAILS}\n\`\`\`\n\n`;
            } else if (process.env.CLIPPY_STATUS === 'success') {
              body += `✅ **No lint warnings**\n\n`;
            }

            body += `### 🧪 Test Results\n`;
            body += `| Suite | Status | Summary | Duration |\n`;
            body += `|-------|--------|---------|----------|\n`;
            body += `| Unit Tests | ${getIcon(process.env.UNIT_STATUS)} | ${process.env.UNIT_SUMMARY || 'N/A'} | ${process.env.UNIT_DURATION || 'N/A'} |\n\n`;
            
            if (process.env.UNIT_FAILURES) {
              body += `#### ❌ Failed Tests\n\`\`\`\n${process.env.UNIT_FAILURES}\n\`\`\`\n\n`;
            } else if (process.env.UNIT_STATUS === 'success') {
              body += `✅ **All unit tests passed**\n\n`;
            }

            if (process.env.HAS_COV === 'true') {
              const gateStatus = process.env.COV_GATE_FAILED === '1'
                ? '❌ **FAILED** (tested files must have ≥ 90% coverage)'
                : '✅ **PASSED**';
              body += `### 📊 Full Coverage Report\n`;
              body += `**Gate: ${gateStatus}**\n`;
              body += `\`${process.env.COV_SUMMARY}\`\n\n`;
              body += `<details open>\n<summary>Per-file Coverage (Lines & Functions)</summary>\n\n`;
              body += `| File | Lines | Functions | Coverage (Line/Func) | Status |\n`;
              body += `|------|-------|-----------|----------------------|--------|\n`;
              body += process.env.COV_GATE_REPORT.replace(/\\n/g, '\n');
              body += `\n</details>\n\n`;
            }

            body += `⏳ *Slow checks (E2E, Release Build) are running or pending...*\n`;
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(tag));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  report-slow:
    name: Slow PR Summary
    needs: [report-quick, format, clippy, unit-tests, e2e-web, build-release-web, rebased-check, coverage-check]
    if: |
      always() &&
      needs.report-quick.result == 'success' &&
      (needs.format.result == 'success' || needs.format.result == 'skipped') &&
      (needs.clippy.result == 'success' || needs.clippy.result == 'skipped') &&
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Download lcov report
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage-lcov
          
      - name: Process Coverage (Regenerate)
        id: cov
        run: |
          if [ -f lcov.info ]; then
            perl -ne '
              if (/^SF:(.+)/) { $sf = $1; $sf =~ s/.*\/src\//src\//; }
              elsif (/^LH:(\d+)/) { $lh = $1; }
              elsif (/^LF:(\d+)/) { $lf = $1; }
              elsif (/^FNH:(\d+)/) { $fnh = $1; }
              elsif (/^FNF:(\d+)/) { $fnf = $1; }
              elsif (/^end_of_record/) {
                $pct = $lf > 0 ? ($lh * 100 / $lf) : 0;
                $pct_f = sprintf("%.1f%%", $pct);
                $fpct = $fnf > 0 ? sprintf("%.1f%%", $fnh * 100 / $fnf) : "100%";
                $status = $pct >= 90 ? "✅" : "❌";
                print "REPORT:| $sf | $lh/$lf | $fnh/$fnf | $pct_f ($fpct) | $status |\n";
                $tlh += $lh; $tlf += $lf; $tfnh += $fnh; $tfnf += $fnf; $tfail = 1 if $pct < 90;
              }
              END {
                $tpct = $tlf > 0 ? ($tlh * 100 / $tlf) : 0;
                print "TOTAL:$tlh/$tlf,$tfnh/$tfnf,$tpct,$tfail\n";
              }
            ' lcov.info > cov_data.txt

            GATE_REPORT=$(grep "^REPORT:" cov_data.txt | sed 's/^REPORT://' | sort)
            TOTAL_DATA=$(grep "^TOTAL:" cov_data.txt | sed 's/^TOTAL://')
            IFS=',' read -r T_LINES T_FUNCS T_PCT T_FAIL <<< "$TOTAL_DATA"
            SUMMARY="Total: $T_LINES lines covered (${T_PCT}%), functions: $T_FUNCS"
            
            echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
            echo "gate_report<<EOF" >> "$GITHUB_OUTPUT"
            echo -e "$GATE_REPORT" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "gate_failed=$T_FAIL" >> "$GITHUB_OUTPUT"
            echo "has_coverage=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_coverage=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update PR Comment with Slow Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        env:
          FORMAT_STATUS: ${{ needs.format.outputs.outcome || needs.format.result }}
          CLIPPY_STATUS: ${{ needs.clippy.outputs.outcome || needs.clippy.result }}
          CLIPPY_WARNINGS: ${{ needs.clippy.outputs.warnings }}
          CLIPPY_DETAILS: ${{ needs.clippy.outputs.details }}
          UNIT_STATUS: ${{ needs.unit-tests.outputs.outcome || needs.unit-tests.result }}
          UNIT_SUMMARY: ${{ needs.unit-tests.outputs.summary }}
          UNIT_DURATION: ${{ needs.unit-tests.outputs.duration }}
          UNIT_FAILURES: ${{ needs.unit-tests.outputs.failures }}
          BUILD_STATUS: ${{ needs.build-release-web.result }}
          BUILD_DURATION: ${{ needs.build-release-web.outputs.duration }}
          E2E_WEB_STATUS: ${{ needs.e2e-web.outputs.outcome || needs.e2e-web.result }}
          E2E_WEB_SUMMARY: ${{ needs.e2e-web.outputs.summary }}
          E2E_WEB_DURATION: ${{ needs.e2e-web.outputs.duration }}
          E2E_WEB_SCREENSHOTS: ${{ needs.e2e-web.outputs.screenshots }}
          LIGHTHOUSE_RESULTS: ${{ needs.build-release-web.outputs.lighthouse_results }}
          IS_REBASED: ${{ needs.rebased-check.outputs.is-rebased }}
          BASE_REF: ${{ github.base_ref }}
          COV_SUMMARY: ${{ steps.cov.outputs.summary }}
          COV_GATE_REPORT: ${{ steps.cov.outputs.gate_report }}
          COV_GATE_FAILED: ${{ steps.cov.outputs.gate_failed }}
          HAS_COV: ${{ steps.cov.outputs.has_coverage }}
        with:
          script: |
            const isRebased = process.env.IS_REBASED === 'true';
            const getIcon = (outcome) => outcome === 'success' ? '✅' : (outcome === 'failure' ? '❌' : (outcome === 'skipped' ? '⏭️' : '⚠️'));
            const tag = '<!-- ci-dashboard -->';
            
            let body = `${tag}\n## 📊 CI Dashboard\n\n`;
            
            body += `### 🛠️ Checks\n`;
            body += `| Check | Status | Details |\n`;
            body += `|-------|--------|---------|\n`;
            body += `| Formatting | ${getIcon(process.env.FORMAT_STATUS)} | |\n`;
            body += `| Linting | ${getIcon(process.env.CLIPPY_STATUS)} | ${process.env.CLIPPY_WARNINGS || '0'} warnings |\n`;
            const buildIcon = isRebased ? getIcon(process.env.BUILD_STATUS) : '⏭️';
            const buildDetails = isRebased ? `Built in ${process.env.BUILD_DURATION || 'N/A'}` : 'N/A';
            body += `| Release Build | ${buildIcon} | ${buildDetails} |\n\n`;
            
            if (process.env.CLIPPY_DETAILS) {
              body += `#### 📝 Linting Issues\n\`\`\`\n${process.env.CLIPPY_DETAILS}\n\`\`\`\n\n`;
            } else if (process.env.CLIPPY_STATUS === 'success') {
              body += `✅ **No lint warnings**\n\n`;
            }

            body += `### 🧪 Test Results\n`;
            body += `| Suite | Status | Summary | Duration |\n`;
            body += `|-------|--------|---------|----------|\n`;
            body += `| Unit Tests | ${getIcon(process.env.UNIT_STATUS)} | ${process.env.UNIT_SUMMARY || 'N/A'} | ${process.env.UNIT_DURATION || 'N/A'} |\n`;
            
            const e2eWebIcon = isRebased ? getIcon(process.env.E2E_WEB_STATUS) : '⏭️';
            const e2eWebSummary = isRebased ? (process.env.E2E_WEB_SUMMARY || 'N/A') : `Skipped: branch not rebased`;
            body += `| E2E Tests (Web) | ${e2eWebIcon} | ${e2eWebSummary} | ${process.env.E2E_WEB_DURATION || 'N/A'} |\n\n`;
            
            if (process.env.UNIT_FAILURES) {
              body += `#### ❌ Failed Unit Tests\n\`\`\`\n${process.env.UNIT_FAILURES}\n\`\`\`\n\n`;
            } else if (process.env.UNIT_STATUS === 'success') {
              body += `✅ **All unit tests passed**\n\n`;
            }

            if (process.env.HAS_COV === 'true') {
              const gateStatus = process.env.COV_GATE_FAILED === '1' ? '❌ **FAILED**' : '✅ **PASSED**';
              body += `### 📊 Full Coverage Report\n**Gate: ${gateStatus}**\n\`${process.env.COV_SUMMARY}\`\n\n`;
              body += `<details>\n<summary>Per-file Coverage (Lines & Functions)</summary>\n\n`;
              body += `| File | Lines | Functions | Coverage (Line/Func) | Status |\n`;
              body += `|------|-------|-----------|----------------------|--------|\n`;
              body += process.env.COV_GATE_REPORT.replace(/\\n/g, '\n');
              body += `\n</details>\n\n`;
            }

            if (isRebased && process.env.LIGHTHOUSE_RESULTS) {
              try {
                const results = JSON.parse(process.env.LIGHTHOUSE_RESULTS);
                if (results && results.length > 0) {
                  const r = results[0];
                  body += `### 🔦 Lighthouse Audit\n`;
                  body += `| Category | Score |\n|----------|-------|\n`;
                  body += `| Performance | ${Math.round(r.summary.performance * 100)}% |\n`;
                  body += `| Accessibility | ${Math.round(r.summary.accessibility * 100)}% |\n`;
                  body += `| PWA | ${Math.round(r.summary.pwa * 100)}% |\n\n`;
                }
              } catch (e) {}
            }
            
            if (process.env.E2E_WEB_SCREENSHOTS) {
              body += `### 📸 E2E Failure Screenshots\n\n`;
              body += process.env.E2E_WEB_SCREENSHOTS + "\n";
            }
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(tag));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body,
              });
            }

      - name: Fail if any check failed
        run: |
          FAIL=0
          if [ "${{ needs.format.result }}" = "failure" ]; then FAIL=1; fi
          if [ "${{ needs.clippy.result }}" = "failure" ]; then FAIL=1; fi
          if [ "${{ needs.unit-tests.result }}" = "failure" ]; then FAIL=1; fi
          if [ "${{ needs.coverage-check.result }}" = "failure" ]; then FAIL=1; fi
          if [ "${{ needs.rebased-check.outputs.is-rebased }}" = "true" ]; then
            if [ "${{ needs.e2e-web.result }}" = "failure" ]; then FAIL=1; fi
            if [ "${{ needs.build-release-web.result }}" = "failure" ]; then FAIL=1; fi
          fi
          if [ "${{ steps.cov.outputs.gate_failed }}" = "1" ]; then FAIL=1; fi
          exit $FAIL
