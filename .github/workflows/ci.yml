name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: determinate-systems/nix-installer-action@v16
      - uses: determinate-systems/magic-nix-cache-action@v11

      - name: Run Coverage Gate
        run: |
          nix develop -c cargo llvm-cov --bin log-out \
            --ignore-filename-regex "src/components/" \
            --fail-under-functions 90 \
            --fail-under-lines 80 \
            --show-missing-lines

      - name: Post Coverage Report
        if: always()
        run: |
          echo "### 📊 Coverage Report (Excluding Components)" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          nix develop -c cargo llvm-cov --bin log-out --ignore-filename-regex "src/components/" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  lighthouse:
    name: PageSpeed Lighthouse
    needs: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: determinate-systems/nix-installer-action@v16
      - uses: determinate-systems/magic-nix-cache-action@v11

      - name: Build Web
        run: nix build .#web -o public-dist

      - name: Lighthouse Audit
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          # Use our built public-dist instead of what's in the config file if necessary
          # Or we can override it via flags
          configPath: .lighthouserc.json
        env:
          LHCI_COLLECT_STATIC_DIST_DIR: ./public-dist

  e2e-web:
    name: Web End-to-End (Maestro)
    needs: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: determinate-systems/nix-installer-action@v16
      - uses: determinate-systems/magic-nix-cache-action@v11

      - name: Build and Serve
        run: |
          nix build .#web -o public-dist
          # Start a simple python server in background
          cd public-dist && python3 -m http.server 8080 &
          sleep 2

      - name: Run Maestro Web Tests
        run: |
          # Install maestro if not available or use from nix
          nix develop -c maestro test maestro/web

      - name: Upload Maestro Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-web-report
          path: ~/.maestro/tests/
