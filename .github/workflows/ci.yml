on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'LICENSE*'
      - '.gitignore'
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read
  issues: write
  checks: read
  statuses: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v6
    - uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
        extra_nix_config: |
          extra-substituters = https://cache.garnix.io
          extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
    - uses: DeterminateSystems/magic-nix-cache-action@v13
    - run: sleep 10 #  Sleep hoping Garnix evaluation will start after
    - uses: lewagon/wait-on-check-action@v1.5.0
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        check-regexp: 'Evaluate flake.nix'
        repo-token: ${{ secrets.GITHUB_TOKEN }}
    - uses: lewagon/wait-on-check-action@v1.5.0
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        check-regexp: 'check coverage.*'
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        fail-on-no-checks: false
    - run: nix build .#checks.x86_64-linux.coverage -o coverage # From Garnix
    - run: | # Process Coverage
        REPORT=$(grep -o "<table>.*</table>" coverage/html/index.html)
        PERCENT=$(jq '.data[0].totals.lines.percent' coverage/coverage.json)
        echo "REPORT<<EOF" >> $GITHUB_OUTPUT
        echo -e "$REPORT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        echo "PERCENT=$PERCENT" >> $GITHUB_OUTPUT
        echo "Coverage is $PERCENT%"
        if (( $(echo "$PERCENT < 80" | bc -l) )); then
          echo "❌ Coverage below 80%"
          echo "FAILED=true" >> $GITHUB_OUTPUT # Store failure for next step
        else
          echo "✅ Coverage above 80%"
        fi
      id: coverage_report
    - if: always() && github.event_name == 'pull_request'
      uses: peter-evans/create-or-update-comment@v5
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body: |
          ### 📊 Coverage Report
          
          ${{ steps.coverage_report.outputs.REPORT }}
    - run: |
        if [ "${{ steps.coverage_report.outputs.FAILED }}" == "true" ]; then
          exit 1
        fi

  lighthouse:
    needs: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v6
    - uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
        extra_nix_config: |
          extra-substituters = https://cache.garnix.io
          extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
    - uses: DeterminateSystems/magic-nix-cache-action@v13
    # - uses: lewagon/wait-on-check-action@v1.5.0
    #   with:
    #     ref: ${{ github.event.pull_request.head.sha || github.sha }}
    #     check-regexp: 'package pages.*'
    #     repo-token: ${{ secrets.GITHUB_TOKEN }}
    #     fail-on-no-checks: false
    - name: Start pages server
      run: |
        nix run .#pages &
        timeout 60 bash -c 'until curl -sf http://localhost:8080/LogOut/ > /dev/null 2>&1; do sleep 1; done'
    - uses: treosh/lighthouse-ci-action@v12
      with:
        urls: http://localhost:8080/LogOut/
        uploadArtifacts: true
        temporaryPublicStorage: true
        configPath: .lighthouserc.json
      id: lighthouse_audit
    - if: always() && github.event_name == 'pull_request'
      run: |
        TMPFILE=$(mktemp)
        echo "### 🚀 Lighthouse Audit" > "$TMPFILE"
        if [ -f .lighthouseci/manifest.json ]; then
          echo "" >> "$TMPFILE"
          echo "| URL | Performance | Accessibility | Best Practices | SEO |" >> "$TMPFILE"
          echo "| --- | --- | --- | --- | --- |" >> "$TMPFILE"
          jq -r '.[] |
            (.url | sub("http://localhost:[0-9]*/"; "")) as $url |
            (.summary.performance // 0 | . * 100 | floor) as $perf |
            (.summary.accessibility // 0 | . * 100 | floor) as $a11y |
            (.summary["best-practices"] // 0 | . * 100 | floor) as $bp |
            (.summary.seo // 0 | . * 100 | floor) as $seo |
            "| `\($url)` | \($perf) | \($a11y) | \($bp) | \($seo) |"
          ' .lighthouseci/manifest.json >> "$TMPFILE"
        fi
        LINKS='${{ steps.lighthouse_audit.outputs.links }}'
        if [ -n "$LINKS" ] && echo "$LINKS" | jq empty 2>/dev/null; then
          echo "" >> "$TMPFILE"
          echo "**Full reports:**" >> "$TMPFILE"
          echo "$LINKS" | jq -r 'to_entries[] | "- [\(.key | sub("http://localhost:[0-9]*/"; ""))](\(.value))"' >> "$TMPFILE"
        fi
        echo "BODY<<EOF" >> $GITHUB_OUTPUT
        cat "$TMPFILE" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
      id: lighthouse_results
    - if: always() && github.event_name == 'pull_request'
      uses: peter-evans/create-or-update-comment@v5
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body: ${{ steps.lighthouse_results.outputs.BODY }}

  e2e-web:
    needs: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45 # Increased from 20: large packages (ungoogled-chromium) need download time
    steps:
    - uses: actions/checkout@v6
    # - uses: wimpysworld/nothing-but-nix@v10
    - uses: cachix/install-nix-action@v31
      with:
        github_access_token: ${{ secrets.GITHUB_TOKEN }}
        extra_nix_config: |
          extra-substituters = https://cache.garnix.io
          extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
    - uses: DeterminateSystems/magic-nix-cache-action@v13
    - run: |
        set -o pipefail
        nix run .#pagesE2eTest |& tee maestro_console.log
    - if: failure() && github.event_name == 'pull_request'
      env:
        CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}
      run: |
        REPORT_BODY="### ❌ Maestro Web E2E Failures\n"
        if [ -f maestro_console.log ]; then
          # Use sed to strip ANSI escape codes for cleaner markdown
          CLEAN_LOG=$(sed 's/\x1b\[[0-9;]*[mG]//g' maestro_console.log | tail -n 100)
          REPORT_BODY="${REPORT_BODY}\n<details>\n<summary>📜 Maestro Console Output (Last 100 lines)</summary>\n\n\`\`\`text\n${CLEAN_LOG}\n\`\`\`\n</details>\n"
        fi
        if [ -n "$CLOUD_NAME" ] && [ -n "$UPLOAD_PRESET" ]; then
          REPORT_BODY="${REPORT_BODY}\n#### 📸 Screenshots\n"
          find ~/.maestro/tests/ -name "*.png" | while read -r img; do
            echo "Uploading $img to Cloudinary (unsigned)..."
            UPLOAD_URL="https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload"
            RESULT=$(curl -s -X POST "$UPLOAD_URL" -F "file=@$img" -F "upload_preset=$UPLOAD_PRESET")
            IMG_URL=$(echo "$RESULT" | jq -r '.secure_url')
            if [ "$IMG_URL" != "null" ]; then
              REPORT_BODY="${REPORT_BODY}\n- ![Screenshot]($IMG_URL)"
            fi
          done
        fi
        echo "REPORT_BODY<<EOF" >> $GITHUB_OUTPUT
        echo -e "$REPORT_BODY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
      id: upload_screenshots
    - if: failure() && github.event_name == 'pull_request' && steps.upload_screenshots.outputs.REPORT_BODY != ''
      uses: peter-evans/create-or-update-comment@v5
      with:
        issue-number: ${{ github.event.pull_request.number }}
        body: ${{ steps.upload_screenshots.outputs.REPORT_BODY }}
    - if: failure() || cancelled()
      uses: actions/upload-artifact@v7
      with:
        name: maestro-web-report
        path: ~/.maestro/tests/
