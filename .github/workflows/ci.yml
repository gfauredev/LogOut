name: CI # Code Quality Gates

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'

permissions:
  contents: read
  pull-requests: write

jobs:
  rebased-check:
    name: Check if rebased on ${{ github.base_ref }}
    runs-on: ubuntu-latest
    outputs:
      is-rebased: ${{ steps.check.outputs.is-rebased }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if branch is rebased
        id: check
        run: |
          git fetch origin "${{ github.base_ref }}"
          BASE_SHA=$(git rev-parse "origin/${{ github.base_ref }}")
          if git merge-base --is-ancestor "$BASE_SHA" HEAD; then
            echo "Branch is rebased on ${{ github.base_ref }}"
            echo "is-rebased=true" >> "$GITHUB_OUTPUT"
          else
            echo "Branch is NOT rebased on ${{ github.base_ref }}, skipping E2E tests"
            echo "is-rebased=false" >> "$GITHUB_OUTPUT"
          fi

  format:
    name: Formatting
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.check.outcome }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: swatinem/rust-cache@v2
      - name: Check formatting
        id: check
        continue-on-error: true
        run: cargo fmt --all -- --check

  clippy:
    name: Lint
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.lint.outcome }}
      warnings: ${{ steps.count.outputs.warnings }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
      - name: Run Clippy
        id: lint
        continue-on-error: true
        run: |
          cargo clippy --all-targets -- -D warnings -W clippy::all -W clippy::pedantic 2>&1 | tee clippy_output.txt
      - name: Count clippy warnings
        id: count
        if: always()
        run: |
          WARNINGS=$(grep -c "warning:" clippy_output.txt || true)
          echo "warnings=$WARNINGS" >> "$GITHUB_OUTPUT"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.tests.outcome }}
      summary: ${{ steps.summarize.outputs.summary }}
      duration: ${{ steps.summarize.outputs.duration }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run unit tests with coverage
        id: tests
        continue-on-error: true
        run: |
          cargo llvm-cov --all-features --bin log-out --lcov --output-path lcov.info 2>&1 | tee unit_test_output.txt
      - name: Summarize unit tests
        id: summarize
        run: |
          SUMMARY=$(grep -E "test result: .*\. [0-9]+ passed; [0-9]+ failed; [0-9]+ ignored" unit_test_output.txt | tail -n 1)
          if [ -z "$SUMMARY" ]; then
            SUMMARY="Unit tests failed before summary."
          fi
          DURATION=$(grep -E "finished in [0-9.]+s" unit_test_output.txt | tail -n 1 | grep -oE "[0-9.]+s" || echo "N/A")
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "duration=$DURATION" >> "$GITHUB_OUTPUT"
      - name: Check coverage gate (≥ 90%)
        run: bash ./scripts/coverage-gate.sh
      - name: Upload lcov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-lcov
          path: lcov.info
          if-no-files-found: ignore
          retention-days: 7

  e2e-web:
    name: Web E2E Tests
    needs: [rebased-check]
    if: needs.rebased-check.outputs.is-rebased == 'true'
    runs-on: ubuntu-latest
    outputs:
      outcome: ${{ steps.maestro.outcome }}
      summary: ${{ steps.summarize.outputs.summary }}
      duration: ${{ steps.summarize.outputs.duration }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: swatinem/rust-cache@v2
      - name: Install Dioxus CLI
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli
      - name: Build web release
        run: dx build --web --release
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Serve PWA and run Maestro web tests
        id: maestro
        continue-on-error: true
        run: |
          dx serve --open false --interactive false --web --release &
          SERVER_PID=$!
          # Wait for server to be responsive
          timeout 60 bash -c 'until curl -sf http://localhost:8080 > /dev/null; do sleep 2; done' || (kill $SERVER_PID && exit 1)
          START_TIME=$(date +%s)
          maestro test --headless maestro/web/ | tee maestro_output.txt
          EXIT_CODE=$?
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "MAESTRO_DURATION=${DURATION}s" >> "$GITHUB_ENV"
          kill $SERVER_PID 2>/dev/null || true
          exit $EXIT_CODE
          
      - name: Summarize Maestro tests
        id: summarize
        run: |
          SUMMARY=$(grep -E "Tests passed: [0-9]+, Tests failed: [0-9]+" maestro_output.txt | tail -n 1)
          if [ -z "$SUMMARY" ]; then
             SUMMARY=$(grep -E "[0-9]+ passed, [0-9]+ failed" maestro_output.txt | tail -n 1)
          fi
          if [ -z "$SUMMARY" ]; then
            if [ "${{ steps.maestro.outcome }}" == "success" ]; then
              SUMMARY="✅ All Maestro tests passed"
            else
              SUMMARY="❌ Maestro tests failed"
            fi
          fi
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "duration=$MAESTRO_DURATION" >> "$GITHUB_OUTPUT"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-diagnostics
          path: ~/.maestro/tests/
          if-no-files-found: ignore
          retention-days: 7

  e2e-android:
    name: Android E2E Tests
    needs: [rebased-check]
    if: needs.rebased-check.outputs.is-rebased == 'true'
    runs-on: macos-13 # Intel macos for nested virtualization support
    outputs:
      outcome: ${{ steps.maestro.outcome }}
      summary: ${{ steps.summarize.outputs.summary }}
      duration: ${{ steps.summarize.outputs.duration }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android
      - uses: swatinem/rust-cache@v2
      - name: Install Dioxus CLI
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli
      - name: Build Android (Project Prep)
        run: |
          dx build --android --release --no-default-features --features mobile-platform
      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Run Maestro Android tests
        uses: reactivecircus/android-emulator-runner@v2
        id: maestro
        continue-on-error: true
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu libgpu_guest -no-audio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            APK_FILE=$(find target/dx/log-out/release/android/ -name "*.apk" | head -n 1)
            maestro install "$APK_FILE"
            START_TIME=$(date +%s)
            maestro test maestro/android/ | tee maestro_output.txt
            EXIT_CODE=${PIPESTATUS[0]}
            END_TIME=$(date +%s)
            DURATION=$((END_TIME - START_TIME))
            echo "MAESTRO_DURATION=${DURATION}s" >> "$GITHUB_ENV"
            exit $EXIT_CODE
            
      - name: Summarize Maestro tests
        id: summarize
        run: |
          SUMMARY=$(grep -E "Tests passed: [0-9]+, Tests failed: [0-9]+" maestro_output.txt | tail -n 1)
          if [ -z "$SUMMARY" ]; then
             SUMMARY=$(grep -E "[0-9]+ passed, [0-9]+ failed" maestro_output.txt | tail -n 1)
          fi
          if [ -z "$SUMMARY" ]; then
            if [ "${{ steps.maestro.outcome }}" == "success" ]; then
              SUMMARY="✅ All Maestro tests passed"
            else
              SUMMARY="❌ Maestro tests failed"
            fi
          fi
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "duration=$MAESTRO_DURATION" >> "$GITHUB_OUTPUT"

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-diagnostics
          path: ~/.maestro/tests/
          if-no-files-found: ignore
          retention-days: 7

  build-release-web:
    name: Build Release Web
    needs: [format, clippy, unit-tests, e2e-web, e2e-android, rebased-check]
    if: |
      always() &&
      needs.format.result == 'success' &&
      needs.clippy.result == 'success' &&
      needs.unit-tests.result == 'success' &&
      needs.e2e-web.result == 'success' &&
      needs.e2e-android.result == 'success' &&
      needs.rebased-check.outputs.is-rebased == 'true'
    permissions:
      actions: write
    runs-on: ubuntu-latest
    outputs:
      duration: ${{ steps.build.outputs.duration }}
      lighthouse_results: ${{ steps.lighthouse.outputs.manifest }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: swatinem/rust-cache@v2
      - name: Install Dioxus CLI
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli
      - name: Build web release
        id: build
        run: |
          START_TIME=$(date +%s)
          dx build --release --platform web --base-path /LogOut
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "duration=${DURATION}s" >> "$GITHUB_OUTPUT"
      - name: Audit with Lighthouse
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.lighthouserc.json
      - name: Upload web deployment build
        uses: actions/upload-artifact@v4
        with:
          name: web-deploy-${{ hashFiles('Cargo.lock', 'src/**', 'assets/**', 'index.html', 'Dioxus.toml') }}
          path: ./target/dx/log-out/release/web/public
          retention-days: 7
          overwrite: true

  report:
    name: PR Summary Report
    needs: [format, clippy, unit-tests, e2e-web, e2e-android, rebased-check, build-release-web]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Download lcov report
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage-lcov
          
      - name: Process Coverage
        id: cov
        run: |
          if [ -f lcov.info ]; then
            TOTAL_LH=0
            TOTAL_LF=0
            while IFS= read -r line; do
              case "$line" in
                LH:*) TOTAL_LH=$((TOTAL_LH + ${line#LH:})) ;;
                LF:*) TOTAL_LF=$((TOTAL_LF + ${line#LF:})) ;;
              esac
            done < lcov.info
            if [ "$TOTAL_LF" -gt 0 ]; then
              TOTAL_PCT=$((TOTAL_LH * 100 / TOTAL_LF))
            else
              TOTAL_PCT=0
            fi
            SUMMARY="Total: ${TOTAL_LH}/${TOTAL_LF} lines covered (${TOTAL_PCT}%)"
            
            # Coverage gate check (≥ 90%)
            TESTED_FILES=$(grep -rl '#\[cfg(test)\]' src/ | sort)
            GATE_REPORT=""
            FAIL=0
            for f in $TESTED_FILES; do
              LH=0; LF=0; IN_FILE=0
              while IFS= read -r line; do
                case "$line" in
                  SF:*"$f") IN_FILE=1 ;;
                  SF:*) IN_FILE=0 ;;
                  LH:*) [ "$IN_FILE" = 1 ] && LH="${line#LH:}" ;;
                  LF:*) [ "$IN_FILE" = 1 ] && LF="${line#LF:}" ;;
                esac
              done < lcov.info
              if [ "$LF" -gt 0 ]; then PCT=$((LH * 100 / LF)); else PCT=0; fi
              STATUS="✅"; if [ "$PCT" -lt 90 ]; then STATUS="❌"; FAIL=1; fi
              GATE_REPORT="${GATE_REPORT}| ${f} | ${LH}/${LF} | ${PCT}% | ${STATUS} |\n"
            done
            
            echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
            echo -e "gate_report=$GATE_REPORT" >> "$GITHUB_OUTPUT"
            echo "gate_failed=$FAIL" >> "$GITHUB_OUTPUT"
            echo "has_coverage=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_coverage=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post/Update PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          FORMAT_STATUS: ${{ needs.format.outputs.outcome }}
          CLIPPY_STATUS: ${{ needs.clippy.outputs.outcome }}
          CLIPPY_WARNINGS: ${{ needs.clippy.outputs.warnings }}
          BUILD_STATUS: ${{ needs.build-release-web.result }}
          BUILD_DURATION: ${{ needs.build-release-web.outputs.duration }}
          UNIT_STATUS: ${{ needs.unit-tests.outputs.outcome }}
          UNIT_SUMMARY: ${{ needs.unit-tests.outputs.summary }}
          UNIT_DURATION: ${{ needs.unit-tests.outputs.duration }}
          E2E_WEB_STATUS: ${{ needs.e2e-web.outputs.outcome }}
          E2E_WEB_SUMMARY: ${{ needs.e2e-web.outputs.summary }}
          E2E_WEB_DURATION: ${{ needs.e2e-web.outputs.duration }}
          E2E_ANDROID_STATUS: ${{ needs.e2e-android.outputs.outcome }}
          E2E_ANDROID_SUMMARY: ${{ needs.e2e-android.outputs.summary }}
          E2E_ANDROID_DURATION: ${{ needs.e2e-android.outputs.duration }}
          LIGHTHOUSE_RESULTS: ${{ needs.build-release-web.outputs.lighthouse_results }}
          IS_REBASED: ${{ needs.rebased-check.outputs.is-rebased }}
          BASE_REF: ${{ github.base_ref }}
          COV_SUMMARY: ${{ steps.cov.outputs.summary }}
          COV_GATE_REPORT: ${{ steps.cov.outputs.gate_report }}
          COV_GATE_FAILED: ${{ steps.cov.outputs.gate_failed }}
          HAS_COV: ${{ steps.cov.outputs.has_coverage }}
        with:
          script: |
            const isRebased = process.env.IS_REBASED === 'true';
            const getIcon = (outcome) => outcome === 'success' ? '✅' : (outcome === 'failure' ? '❌' : '⚠️');
            const tag = '<!-- ci-dashboard -->';
            
            let body = `${tag}\n## 📊 CI Dashboard\n\n`;
            
            body += `### 🛠️ Checks\n`;
            body += `| Check | Status | Details |\n`;
            body += `|-------|--------|---------|\n`;
            body += `| Formatting | ${getIcon(process.env.FORMAT_STATUS)} | |\n`;
            const clippyWarns = process.env.CLIPPY_WARNINGS || '0';
            body += `| Linting | ${getIcon(process.env.CLIPPY_STATUS)} | ${clippyWarns} warnings |\n`;
            const buildIcon = isRebased ? getIcon(process.env.BUILD_STATUS) : '⏭️';
            const buildDetails = isRebased ? `Built in ${process.env.BUILD_DURATION || 'N/A'}` : 'N/A';
            body += `| Release Build | ${buildIcon} | ${buildDetails} |\n\n`;
            
            body += `### 🧪 Test Results\n`;
            body += `| Suite | Status | Summary | Duration |\n`;
            body += `|-------|--------|---------|----------|\n`;
            body += `| Unit Tests | ${getIcon(process.env.UNIT_STATUS)} | ${process.env.UNIT_SUMMARY || 'N/A'} | ${process.env.UNIT_DURATION || 'N/A'} |\n`;
            
            const e2eWebIcon = isRebased ? getIcon(process.env.E2E_WEB_STATUS) : '⏭️';
            const e2eWebSummary = isRebased
              ? (process.env.E2E_WEB_SUMMARY || 'N/A')
              : `Skipped: branch not rebased on ${process.env.BASE_REF || 'main'}`;
            const e2eWebDuration = isRebased ? (process.env.E2E_WEB_DURATION || 'N/A') : 'N/A';
            body += `| E2E Tests (Web) | ${e2eWebIcon} | ${e2eWebSummary} | ${e2eWebDuration} |\n`;
            
            const e2eAndroidIcon = isRebased ? getIcon(process.env.E2E_ANDROID_STATUS) : '⏭️';
            const e2eAndroidSummary = isRebased
              ? (process.env.E2E_ANDROID_SUMMARY || 'N/A')
              : `Skipped: branch not rebased on ${process.env.BASE_REF || 'main'}`;
            const e2eAndroidDuration = isRebased ? (process.env.E2E_ANDROID_DURATION || 'N/A') : 'N/A';
            body += `| E2E Tests (Android) | ${e2eAndroidIcon} | ${e2eAndroidSummary} | ${e2eAndroidDuration} |\n\n`;
            
            if (isRebased && (process.env.E2E_WEB_STATUS === 'failure' || process.env.E2E_ANDROID_STATUS === 'failure')) {
              body += `⚠️ **E2E tests failed.** Check the artifacts for diagnostics and screenshots.\n\n`;
            }
            
            if (process.env.HAS_COV === 'true') {
              const gateStatus = process.env.COV_GATE_FAILED === '1'
                ? '❌ **FAILED** (tested files must have ≥ 90% coverage)'
                : '✅ **PASSED**';
              body += `### 📊 Coverage Gate ${gateStatus}\n`;
              body += `\`${process.env.COV_SUMMARY}\`\n\n`;
              body += `<details>\n<summary>Per-file Results</summary>\n\n`;
              body += `| File | Lines | Coverage | Status |\n`;
              body += `|------|-------|----------|--------|\n`;
              body += process.env.COV_GATE_REPORT.replace(/\\n/g, '\n');
              body += `\n</details>\n\n`;
            }

            if (isRebased && process.env.LIGHTHOUSE_RESULTS) {
              try {
                const results = JSON.parse(process.env.LIGHTHOUSE_RESULTS);
                if (results && results.length > 0) {
                  const r = results[0];
                  body += `### 🔦 Lighthouse Audit\n`;
                  body += `| Category | Score |\n`;
                  body += `|----------|-------|\n`;
                  body += `| Performance | ${Math.round(r.summary.performance * 100)}% |\n`;
                  body += `| Accessibility | ${Math.round(r.summary.accessibility * 100)}% |\n`;
                  body += `| Best Practices | ${Math.round(r.summary['best-practices'] * 100)}% |\n`;
                  body += `| SEO | ${Math.round(r.summary.seo * 100)}% |\n`;
                  body += `| PWA | ${Math.round(r.summary.pwa * 100)}% |\n\n`;
                  if (r.url) {
                    body += `[View Full Report](${r.url})\n\n`;
                  }
                }
              } catch (e) {
                console.log("Failed to parse Lighthouse results", e);
              }
            }
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(tag));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if any check failed
        run: |
          FAIL=0
          if [ "${{ needs.format.outputs.outcome }}" != "success" ]; then echo "Format check failed"; FAIL=1; fi
          if [ "${{ needs.clippy.outputs.outcome }}" != "success" ]; then echo "Clippy check failed"; FAIL=1; fi
          if [ "${{ needs.unit-tests.outputs.outcome }}" != "success" ]; then echo "Unit tests failed"; FAIL=1; fi
          if [ "${{ needs.rebased-check.outputs.is-rebased }}" == "true" ]; then
            if [ "${{ needs.e2e-web.result }}" != "success" ]; then echo "Web E2E tests failed"; FAIL=1; fi
            if [ "${{ needs.e2e-android.result }}" != "success" ]; then echo "Android E2E tests failed"; FAIL=1; fi
            if [ "${{ needs.build-release-web.result }}" == "failure" ]; then echo "Release build failed"; FAIL=1; fi
          fi
          if [ "${{ steps.cov.outputs.gate_failed }}" == "1" ]; then echo "Coverage gate failed"; FAIL=1; fi
          exit $FAIL
