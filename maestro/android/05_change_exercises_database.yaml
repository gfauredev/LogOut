# User Story 5 – Change Exercises Database (Android)
# Change the database URL via the Credits page.
appId: com.gfaure.logworkout
---
- tapOn: "ℹ️"
- assertVisible: Credits
- assertVisible: ⚙️ Exercise Database URL
- tapOn:
    id: "db_url_input"
- inputText: "http://10.0.2.2:8080"
- tapOn: "💾"
# The URL should now be set and saved.
- assertVisible: "http://10.0.2.2:8080"
