# User Story 21 – Navigate Again to Analytics (Android)
# After completing sessions, the Analytics page is accessible from any screen.
appId: com.gfaure.logworkout
---
- assertVisible: LogOut
# Navigate to the exercise list first (to simulate navigating from another page)
- tapOn: "📚"
- assertVisible: Exercise Database
# Now navigate to analytics
- tapOn: "📊"
- assertVisible: Analytics
# Exercises from completed sessions should be available to select
- assertVisible: Metric
- assertVisible: Exercises
