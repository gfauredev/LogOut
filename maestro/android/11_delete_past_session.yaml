# User Story 11 – Delete a Past Session (Android)
# Complete a session, then delete it from the home screen.
appId: com.gfaure.logworkout
---
# Wait for the app to load
- extendedWaitUntil:
    visible:
      text: "LogOut"
    timeout: 120000

# Start a new session
- tapOn: "+"
- assertVisible: "Active Session"

# Search for and select an exercise
- tapOn: "Search for an exercise..."
- inputText: "barbell squat"
- extendedWaitUntil:
    visible:
      text: "Barbell Squat"
    timeout: 30000
- tapOn: "Barbell Squat"

# Input weight and reps
- tapOn:
    text: "Optional"
- inputText: "80"
- tapOn:
    text: "Reps"
- inputText: "5"

# Complete the exercise
- tapOn: "✓ Complete Exercise"
- assertVisible: "Completed Exercises"

# Finish the session
- tapOn: "Finish Session"
- extendedWaitUntil:
    visible:
      text: "LogOut"
    timeout: 10000
- assertVisible: "Barbell Squat"

# Delete the session using the 🗑️ button on the session card
- tapOn: "🗑️"

# Confirm the deletion in the modal dialog
- assertVisible: "Delete this session?"
- tapOn: "Delete"

# The session card should no longer be visible
- extendedWaitUntil:
    visible:
      text: "LogOut"
    timeout: 5000
- assertNotVisible: "Barbell Squat"
