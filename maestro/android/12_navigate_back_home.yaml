# User Story 12 – Navigate Back to Home (Android)
# After navigating away, the "💪" button returns to the Home page.
appId: com.gfaure.logworkout
---
- assertVisible: LogOut
# Navigate to the exercise browser
- tapOn: "📚"
- assertVisible: "Exercise Database"
# Navigate back to home with the 💪 button
- tapOn: "💪"
- assertVisible: "LogOut"
