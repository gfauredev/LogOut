# User Story 5 – Learn About an Exercise (Android)
# Clicking an exercise heading reveals its details: instructions, image, and tags.
appId: com.gfaure.logworkout
---
- extendedWaitUntil:
    visible:
      text: "LogOut"
    timeout: 120000
- tapOn: "📚"
- assertVisible: "Exercise Database"
# Wait for exercises to load
- extendedWaitUntil:
    visible:
      text: "Barbell Bench Press - Medium Grip"
    timeout: 30000
# Click the exercise heading to reveal instructions
- tapOn: "Barbell Bench Press - Medium Grip"
# Instructions should appear (exercise has instructions in the DB)
- assertVisible: "Lie on a flat bench"
# Click the exercise image to cycle to the next image
- tapOn:
    id: ".*img.*"
    optional: true
# Tags should be visible: category (Push), force (Push), equipment, level
- assertVisible: "Push"
