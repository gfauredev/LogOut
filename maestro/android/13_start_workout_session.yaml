# User Story 13 – Start Workout Session (Android)
# Start a new workout session from the home screen.
appId: com.gfaure.logworkout
---
- extendedWaitUntil:
    visible:
      text: "LogOut"
    timeout: 120000
- tapOn: "+"
- assertVisible: "Active Session"
- assertVisible: "Cancel Session"
# Wait 1 second and verify the timer is running (it shows some elapsed time)
- waitForAnimationToEnd
- assertVisible: "0:00"
# Clean up: cancel the empty session
- tapOn: "Cancel Session"
- assertVisible: "LogOut"
