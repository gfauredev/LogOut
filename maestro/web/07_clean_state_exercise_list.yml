url: ${APP_URL}?dl_db_url=${DB_URL_ENCODED}
---
# User Story: Clean State Exercise List
# Precondition: No custom exercises (launchApp clears IndexedDB)
- launchApp
- tapOn: "📚"
- assertVisible: "📚 Exercises"
# Wait for mock exercises to load
- assertVisible: "Ring Dip"
# Built-in exercises show the "+" (Clone then edit) button, not "✏️"
- assertVisible: "+"
- assertNotVisible: "✏️"
