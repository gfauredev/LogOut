# User Story 9 – Clean State Analytics (Web PWA)
# In the analytics page, selecting a metric shows no exercises can be selected
# because no workout sessions have been completed yet.
url: http://localhost:8080
---
- assertVisible: LogOut
- tapOn: "📊"
- assertVisible: Analytics
# Select the "Weight" metric
- tapOn: "Weight (kg)"
# The exercise selector should show only the empty option (no exercises done yet)
- assertVisible: -- Select Exercise --
# Select "Repetitions" metric and verify same
- tapOn: "Repetitions"
- assertVisible: -- Select Exercise --
