# User Story: Search Exercises in Browser
- launchApp
- tapOn: "📚"
- assertVisible: "📚 Exercises"
# Wait for exercises to load
- assertVisible: "Ring Dip"
# Type a search term in the search input
- tapOn: "Search exercises, muscles, or categories..."
- inputText: "ring"
- assertVisible: "Ring Dip"
- assertNotVisible: "Romanian Deadlift"
# Clear search to restore full list
- clearText
- assertVisible: "Romanian Deadlift"
