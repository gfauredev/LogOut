# User Story 9 – Learn About an Exercise (Web PWA)
# Clicking an exercise heading reveals its details: instructions, image, and tags.
url: http://localhost:8080
---
- assertVisible: LogOut
- tapOn: "📚"
- assertVisible: Exercise Database
# Wait for exercises to load
- assertVisible: Pushups
# Click the exercise heading to reveal instructions
- tapOn: "Pushups"
# Instructions should appear
- assertVisible: ".*Lie on the floor.*"
# Tags should be visible
- assertVisible: "strength"
- assertVisible: "push"
- assertVisible: "body only"
- assertVisible: "beginner"
# Muscles
- assertVisible: "chest"
- assertVisible: "shoulders"
- assertVisible: "triceps"
# Click the exercise image to cycle (optional check)
- tapOn:
    point: "50%, 50%"
    optional: true
