# User Story 12 – Navigate to Analytics (Web PWA)
# Navigate to the Analytics page via the bottom navigation bar.
url: http://localhost:8080
---
- launchApp
- tapOn:
    css: "nav > .analytics"
- assertVisible: "📊 Analytics"
# The metric selector should be present on the analytics page
- assertVisible: Metric
- assertVisible: Weight (kg)
