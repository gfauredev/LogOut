# User Story 7 – Edit a Cloned Exercise (Web PWA)
# Clone a built-in exercise and edit its name.
url: http://localhost:8080
---
- extendedWaitUntil:
    visible:
      text: "LogOut"
    timeout: 120000
# Navigate to the exercise browser
- tapOn: "📚"
- assertVisible: "Exercise Database"
# Wait for exercises to load from the local @exercises.test.json database
- extendedWaitUntil:
    visible:
      text: "✏️ Clone & Edit"
    timeout: 10000
# Search for Pushups to get a predictable target exercise
- tapOn: "Search exercises, muscles, or categories..."
- inputText: "Pushups"
- extendedWaitUntil:
    visible:
      text: "Pushups"
    timeout: 5000
# Click "Clone & Edit" on Pushups
- tapOn: "✏️ Clone & Edit"
# The Edit Exercise form should open
- assertVisible: "Edit Exercise"
- assertVisible: "Exercise Name *"
# Clear the current name and enter a new one
- tapOn:
    text: "Pushups"
- eraseText
- inputText: "My Cloned Pushups"
# Save the changes
- tapOn: "💾 Save Changes"
# We should be back on the exercise browser
- assertVisible: "Exercise Database"
# Search for the modified clone
- tapOn: "Search exercises, muscles, or categories..."
- inputText: "My Cloned Pushups"
- assertVisible: "My Cloned Pushups"
# The cloned exercise should show "✏️ Edit", not "✏️ Clone & Edit"
- assertVisible: "✏️ Edit"
