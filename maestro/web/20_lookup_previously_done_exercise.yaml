# User Story 20 – Lookup a Previously Done Exercise (Web PWA)
# Click an exercise tag on a session card to pre-fill the Exercise List search.
url: http://localhost:8080
---
- launchApp
# Wait for the app with session cards from Story 15
- assertVisible: Wide-Grip Barbell Bench Press
# Click the "Wide-Grip Barbell Bench Press" exercise tag on the session card
- tapOn: "Wide-Grip Barbell Bench Press"
# The Exercise List should open with the exercise name pre-filled in the search
- assertVisible: "📚 Exercises"
- assertVisible: Wide-Grip Barbell Bench Press
