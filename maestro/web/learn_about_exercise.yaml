# User Story – Learn About an Exercise (Web PWA)
# Clicking an exercise heading reveals its details: instructions, image, and tags.
url: http://localhost:8080
---
- launchApp
- runFlow: ../subflows/nav_exercises.yaml
- tapOn: "Search exercises, muscles, or categories..."
- inputText: "push-up"
- scrollUntilVisible:
    element: "Pushups"
    direction: DOWN
- tapOn: "Pushups"
- assertVisible: ".*Lie on the floor.*"
- assertVisible: "strength"
- assertVisible: "push"
- assertVisible: "body only"
- assertVisible: "beginner"
- assertVisible: "chest"
- assertVisible: "shoulders"
- assertVisible: "triceps"
- tapOn:
    point: "50%, 50%"
    optional: true # Not all exercises have images
