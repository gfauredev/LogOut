# User Story – Clean State Exercise List (Web PWA)
# Before any custom exercises are added, built-in exercises show "+" (Clone then edit),
# not "✏️" (Edit, for custom exercises only).
url: http://localhost:8080
---
- launchApp
- runFlow: ../subflows/nav_exercises.yaml
# "+" (clone button) must be visible for built-in exercises
- assertVisible: "\\+"
# "✏️" (edit button for custom exercises) must NOT be visible yet
- assertNotVisible: "✏️"
