# User Story 18 – Lookup a Previously Done Exercise (Web PWA)
# Click an exercise tag on a session card to pre-fill the Exercise List search.
url: http://localhost:8080
---
# Wait for the app with session cards from Story 15
- extendedWaitUntil:
    visible:
      text: "LogOut"
    timeout: 120000
- assertVisible: "Barbell Bench Press - Medium Grip"
# Click the "Barbell Bench Press - Medium Grip" exercise tag on the session card
- tapOn: "Barbell Bench Press - Medium Grip"
# The Exercise List should open with the exercise name pre-filled in the search
- assertVisible: "Exercise Database"
- assertVisible: "Barbell Bench Press - Medium Grip"
