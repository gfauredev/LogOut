# User Story 11 – Edit a Cloned Exercise (Web PWA)
# Clone a built-in exercise and edit its name.
url: http://localhost:8080
---
- launchApp
# Navigate to the exercise browser
- tapOn:
    css: "nav > .exercises"
- assertVisible: "📚 Exercises"
# Search for Pushups to get a predictable target exercise
- tapOn: "Search exercises, muscles, or categories..."
- inputText: "… pushups" # Avoid matching Handstand Pushups…
- assertVisible: Pushups
- tapOn: "+"
- assertVisible: (Add|Edit) Exercise
- assertVisible: Exercise Name *
- tapOn:
    text: "Pushups"
- eraseText
- inputText: "My Cloned Pushups"
- tapOn: "💾 Save Changes"
- assertVisible: "📚 Exercises"
# Search for the modified clone
- tapOn: "Search exercises, muscles, or categories..."
- inputText: "My Cloned Pushups"
- assertVisible: My Cloned Pushups
- assertVisible: ✏️
