url: ${APP_URL}?dl_db_url=${DB_URL_ENCODED}
---
# User Story: Add Custom Exercise
- launchApp
- tapOn: "📚"
- assertVisible: "📚 Exercises"
# Wait for exercises to load, then tap "+" to add a custom exercise
- assertVisible: "Ring Dip"
- tapOn:
    text: "+"
    index: 0
- assertVisible: "Add Exercise"
# Fill in the exercise name (required field)
- tapOn: "Exercise Name *"
- inputText: "My Test Exercise"
# Save the exercise
- tapOn: "💾 Save Exercise"
# Navigate back to the exercise list and verify the new exercise is visible
- assertVisible: "My Test Exercise"
