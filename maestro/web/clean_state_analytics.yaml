# User Story – Clean State Analytics (Web PWA)
# In the analytics page, selecting a metric shows no exercises can be selected
# because no workout sessions have been completed yet.
# Precondition: no workout sessions have been completed.
url: http://localhost:8080
---
- launchApp
- runFlow: ../subflows/nav_analytics.yaml
# Select the "Weight" metric; no exercise should be selectable yet
- tapOn: "Weight (kg)"
- assertVisible: -- Select Exercise --
# Select "Repetitions" and verify the same
- tapOn: "Repetitions"
- assertVisible: -- Select Exercise --
