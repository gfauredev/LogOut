# User Story 12 – Repeat Session from History (Web PWA)
# Complete a session, then use the 🔄 button to start a repeat session.
url: http://localhost:8080
---
# Wait for the app to load
- extendedWaitUntil:
    visible:
      text: "LogOut"
    timeout: 120000

# Start a new session
- tapOn: "+"
- assertVisible: "Active Session"

# Search for and select an exercise
- tapOn: "Search for an exercise..."
- inputText: "bench press"
- extendedWaitUntil:
    visible:
      text: "Barbell Bench Press - Medium Grip"
    timeout: 30000
- tapOn: "Barbell Bench Press - Medium Grip"

# Input weight and reps
- tapOn:
    text: "Optional"
- inputText: "60"
- tapOn:
    text: "Reps"
- inputText: "8"

# Complete the exercise
- tapOn: "✓ Complete Exercise"
- assertVisible: "Completed Exercises"

# Finish the session
- tapOn: "Finish Session"
- extendedWaitUntil:
    visible:
      text: "LogOut"
    timeout: 10000
- assertVisible: "Barbell Bench Press - Medium Grip"

# Tap the 🔄 button to start a repeat session
- tapOn: "🔄"

# A new active session should open with the exercise pre-added
- assertVisible: "Active Session"
- assertVisible: "Pre-added Exercises"
- assertVisible: "Barbell Bench Press - Medium Grip"

# Cancel the new session to clean up
- tapOn: "Cancel Session"
- extendedWaitUntil:
    visible:
      text: "LogOut"
    timeout: 10000
