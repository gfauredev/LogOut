url: ${APP_URL}?dl_db_url=${DB_URL_ENCODED}
---
# User Story: Edit a Cloned Exercise
- launchApp
- tapOn: "📚"
- assertVisible: "📚 Exercises"
# Wait for exercises to load, then tap "+" on a built-in exercise to clone it
- assertVisible: "Ring Dip"
- tapOn:
    text: "+"
    index: 1
# The edit exercise page opens with the cloned exercise data
- assertVisible: "Edit Exercise"
# Change the exercise name
- tapOn: "Exercise Name *"
- eraseText
- inputText: "My Ring Dip Variation"
# Save the changes
- tapOn: "💾 Save Changes"
# Navigate back to the exercise list and verify the modified clone is visible
- tapOn: "📚"
- assertVisible: "My Ring Dip Variation"
