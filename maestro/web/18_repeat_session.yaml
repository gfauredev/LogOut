# User Story 18 – Repeat Session from History (Web PWA)
# Start a new session based on a past workout using the 🔄 button.
url: http://localhost:8080
---
# Wait for the app to load with the session from Story 15
- assertVisible: Wide-Grip Barbell Bench Press
# Tap the 🔄 button to start a repeat session
- tapOn:
    css: "button[title=Start a new session based on this one]"
# A new active session should open with exercises pre-added
- assertVisible:
    css: "header.session h2"
- assertVisible: Wide-Grip Barbell Bench Press
- assertVisible: Barbell Full Squat
# Cancel the repeat session to preserve state for next stories
- tapOn:
    css: "button[title='Cancel Session']"
