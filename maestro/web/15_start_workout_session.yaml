# User Story 15 – Start Workout Session (Web PWA)
# Start a new workout session from the home screen
url: http://localhost:8080
---
- tapOn:
    css: ".new-session-button"
- assertVisible:
    css: ".session-header h2"
- assertVisible:
    css: ".btn--cancel-session"
- assertVisible: "00:01" # Wait for the timer to start and increment by 1 second
- tapOn: # Clean up: cancel the empty session
    css: ".btn--cancel-session"
# Home page should show the empty state (no sessions), and the header
- assertVisible: "💪 LogOut"
- assertVisible: No past sessions yet
- assertVisible: Tap + to start your first workout
