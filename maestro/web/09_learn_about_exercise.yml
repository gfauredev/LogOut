url: ${APP_URL}?dl_db_url=${DB_URL_ENCODED}
---
# User Story: Learn About an Exercise
- launchApp
- tapOn: "📚"
- assertVisible: "📚 Exercises"
# Wait for exercises to load
- assertVisible: "Ring Dip"
# Click the exercise name to expand its instructions
- tapOn: "Ring Dip"
# Instructions should now be visible (first step of Ring Dip)
- assertVisible: "Grip a ring in each hand"
