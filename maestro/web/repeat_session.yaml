# User Story – Repeat Session from History (Web PWA)
# Start a new session based on a past workout using the 🔄 button.
# This test is self-contained: it creates a session first, then tests the repeat.
url: http://localhost:8080
---
- launchApp

# Create a bench press + squat session to repeat from
- runFlow: ../subflows/create_bench_squat_session.yaml

# Tap the 🔄 button to start a new session based on the completed one
- tapOn:
    css: "button[title='Start a new session based on this one']"
# A new active session opens with exercises pre-added
- assertVisible:
    css: "header.session h2"
- assertVisible: Wide-Grip Barbell Bench Press
- assertVisible: Barbell Full Squat

# Cancel the repeat session to leave the app in a clean state
# The session has pre-added exercises but no recorded ones (exercise_count=0 → shows ❌)
- tapOn:
    css: "header.session button.no"
