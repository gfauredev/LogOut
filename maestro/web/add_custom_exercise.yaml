# User Story – Add Custom Exercise (Web PWA)
# Navigate to the exercise browser, add a custom exercise, then search for it.
url: http://localhost:8080
---
- launchApp
- runFlow: ../subflows/setup_local_db.yaml
- runFlow: ../subflows/nav_exercises.yaml
# Tap the "+" link to open the Add Exercise form
- tapOn:
    text: "+"
- assertVisible: Add Exercise
- assertVisible: Exercise Name *
# Fill in the exercise name
- tapOn: "e.g., Farmer's Walk"
- inputText: "My Test Exercise"
# Save the exercise
- tapOn: "💾 Save Exercise"
# Back on the exercise browser
- assertVisible: "📚 Exercises"
# Search for the new exercise to confirm it was added
- tapOn: "Search exercises, muscles, or categories..."
- inputText: "My Test Exercise"
- assertVisible: My Test Exercise
