# User Story – Start Workout Session (Web PWA)
# Start a new workout session from the home screen and verify the active session.
url: http://localhost:8080
---
- launchApp
- runFlow: ../subflows/start_session.yaml
# Header shows "Cancel Session" button (❌) when the session is empty
- assertVisible: "❌"
# Timer is visible and has already incremented past 00:00
- assertVisible: 00:\d[1-9]
