# User Story – Navigate to Analytics After Sessions (Web PWA)
# After completing sessions, the Analytics page shows exercises from the history
url: http://localhost:8080
---
- launchApp

# Create a session so exercises are available in analytics
- runFlow: ../subflows/create_bench_squat_session.yaml

# Navigate to the exercise list first (to simulate navigating from another page)
- runFlow: ../subflows/nav_exercises.yaml

# Now navigate to analytics
- runFlow: ../subflows/nav_analytics.yaml
# Exercises from completed sessions should be available to select
- assertVisible: Metric
- assertVisible: Exercises
