url: ${APP_URL}?dl_db_url=${APP_URL_ENCODED}
---
# User Story: Be Astonished by Your Incredible Progress
# Precondition: Two past sessions with ring_dip at different rep counts.
- runFlow: _flows/setup_progress_sessions.yml
# Navigate to Analytics
- tapOn: "📊"
- assertVisible: "📊 Analytics"
# The exercise selectors are visible
- assertVisible: "-- Select Exercise --"
# Ring Dip is available for selection (it was done in the setup sessions)
- assertVisible: "Ring Dip"
