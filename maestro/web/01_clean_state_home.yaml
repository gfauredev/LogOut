# User Story 1 – Clean State Home (Web PWA)
# The app loads in a clean initial state with no past sessions.
# Visit test-setup.html first to configure the exercise database URL so that
# tests use the local exercises.test.json instead of the remote database.
appId: http://localhost:8080/test-setup.html?exercise_db_url=http://localhost:8080/
---
- extendedWaitUntil:
    visible:
      text: "LogOut"
    timeout: 120000
- assertVisible: "Log your workOut"
- assertVisible: "No past sessions yet"
- assertVisible: "Tap + to start your first workout"
- assertVisible: "📚"
- assertVisible: "💪"
- assertVisible: "📊"
- assertVisible: "ℹ️"
