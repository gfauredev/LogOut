# User Story 1 – Clean State Home (Web PWA)
# The app loads in a clean initial state with no past sessions.
url: http://localhost:8080
---
- launchApp
- assertVisible: "💪 LogOut"
- assertVisible: "Turn off your computer, Log your workOut"
- assertVisible: "No past sessions yet."
- assertVisible: "Tap + to start your first workout!"
- assertVisible: "📚"
- assertVisible: "💪"
- assertVisible: "📊"
- assertVisible: "ℹ️"
