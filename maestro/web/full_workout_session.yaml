# User Story – Full Workout Session (Web PWA)
# Complete a full workout with two different exercises, replay sets, remove one
# completed exercise, and finish the session
url: http://localhost:8080
---
- launchApp
# Go home and start a new session
- runFlow: ../subflows/nav_home.yaml
- runFlow: ../subflows/start_session.yaml
- assertVisible: ⏱️ Active Session
- runFlow: ../subflows/record_bench_press_2sets.yaml
- runFlow: ../subflows/record_squat_set.yaml
# ── Remove Exercise (delete the latest – second squat set) ────────────────────
- tapOn:
    css: "article header button.no"
# Now there should be 3 completed exercises
- assertVisible: Completed Exercises
- assertVisible: Wide-Grip Barbell Bench Press
- assertVisible: Barbell Full Squat
# Finish Session button must be visible (session is not empty)
- assertVisible:
    css: "#main>header button.yes"

# ── Finish Session ─────────────────────────────────────────────────────────────
- runFlow: ../subflows/finish_session.yaml
# A congratulation toast appears
- assertVisible: "🎉 Great workout! Session complete!"
# Back on home screen with the completed session
- assertVisible: "💪 LogOut"
- assertVisible: "Today"
- assertVisible: Wide-Grip Barbell Bench Press
