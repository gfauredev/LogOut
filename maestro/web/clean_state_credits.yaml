# User Story – Clean State Credits (Web PWA)
# The Credits page shows the default exercise database URL.
# Precondition: the exercise database URL has not been changed from the default.
url: http://localhost:8080
---
- launchApp
- runFlow: ../subflows/nav_credits.yaml
- assertVisible: ⚙️ Exercise Database URL
# The URL input field should show the default URL
- assertVisible: https://raw.githubusercontent.com/gfauredev/free-exercise-db/main/
