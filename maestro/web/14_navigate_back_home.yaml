# User Story 14 – Navigate Back to Home (Web PWA)
# After navigating away, the "💪" button returns to the Home page.
url: http://localhost:8080
---
- assertVisible: LogOut
# Navigate to the exercise browser
- tapOn: "📚"
- assertVisible: Exercise Database
# Navigate back to home with the 💪 button
- tapOn: "💪"
# The home page heading and empty-state content should be visible (not just the nav header)
- assertVisible: No past sessions yet
- assertVisible: Tap + to start your first workout
