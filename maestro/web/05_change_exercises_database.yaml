# User Story 5 – Change Exercises Database (Web PWA)
# Change the database URL via the Credits page.
url: http://localhost:8080
---
- tapOn: "ℹ️"
- assertVisible: Credits
- assertVisible: ⚙️ Exercise Database URL
- tapOn:
    id: "db_url_input"
- inputText: "http://localhost:8080"
- tapOn: "💾"
# The URL should now be set and saved.
- assertVisible: "http://localhost:8080"
