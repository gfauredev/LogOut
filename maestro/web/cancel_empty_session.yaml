# User Story – Cancel Empty Session (Web PWA)
# Cancel an empty workout session and verify return to the home screen.
url: http://localhost:8080
---
- launchApp
- runFlow: ../subflows/start_session.yaml
# The "❌ Cancel Session" button is visible when the session is empty
- assertVisible: "❌"
# Tap "❌" to cancel the empty session
- runFlow: ../subflows/cancel_session.yaml
# Back on the home screen
- assertVisible: .*LogOut
- assertVisible: No past sessions yet
- assertVisible: Tap + to start your first workout
