# User Story 16 – Cancel Empty Session (Web PWA)
# Cancel an empty workout session and return to the home screen
url: http://localhost:8080
---
- launchApp
- tapOn: +
    # css: "#main > button"
- assertVisible: ⏱️ Active Session
- assertVisible: ❌
- assertNotVisible: "00:00" # Ensure timer has incremented
- tapOn:
    css: "header button"
- assertVisible: "💪 LogOut"
- assertVisible: No past sessions yet
- assertVisible: Tap + to start your first workout
