# User Story – Navigate to Analytics (Web PWA)
# Navigate to the Analytics page via the bottom navigation bar.
url: http://localhost:8080
---
- launchApp
- runFlow: ../subflows/nav_analytics.yaml
# The metric selector should be present on the analytics page
- assertVisible: Metric
- assertVisible: Weight (kg)
# The "📊" nav button is slightly emphasized (active class)
- assertVisible:
    css: "nav > .analytics.active"
