# User Story – Delete Past Sessions (Web PWA)
# Create a session, then delete it via the 🗑️ button and confirmation dialog
url: http://localhost:8080
---
- launchApp
- runFlow: ../subflows/nav_home.yaml
# Create a session to delete
- runFlow: ../subflows/start_session.yaml
- runFlow: ../subflows/record_squat_set.yaml
- runFlow: ../subflows/finish_session.yaml
- assertVisible: Barbell Full Squat
- tapOn: # 🗑️
    css: article header button.no
# Confirm the deletion in the dialog
- assertVisible: Delete this session?
- tapOn:
    text: .*Delete # 🗑️ Delete
    css: button.no
# The deleted session is gone; home shows the empty state if it was the only one
- assertVisible: .*LogOut
