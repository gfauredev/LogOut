# User Story 8 – Search Exercises in Browser (Web PWA)
# Search for exercises in the Exercise List and verify filtering works.
url: http://localhost:8080
---
- assertVisible: LogOut
- tapOn: "📚"
- assertVisible: Exercise Database
# Type a search term and verify results appear
- tapOn: "Search exercises, muscles, or categories..."
- inputText: "push"
- assertVisible: Exercise Database
# Clear the search and verify the full list is restored
- eraseText
- assertVisible: Exercise Database
- assertVisible: ✏️ Clone & Edit
