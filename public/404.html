<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Redirecting…</title>
  <script>
    // When a direct URL is requested (e.g. /LogOut/exercises), GitHub Pages
    // returns this 404 page
    // Encode the full path in the query string and redirect to the app root
    // so that the Dioxus router can handle it
    const l = window.location;
    const segments = l.pathname.split('/');
    // Keep the first non-empty path segment as the base (e.g. "/LogOut")
    // Fall back to '' for root deployments
    const base = segments[1] ? '/' + segments[1] : '';
    const rest = l.pathname.slice(base.length + 1);
    l.replace(
      l.protocol + '//' + l.host + base + '/' +
      '?redirect=' + encodeURIComponent(rest + l.search + l.hash)
    );
  </script>
</head>

<body>Redirecting…</body>

</html>
