<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Redirecting…</title>
  <script>
    const l = window.location;
    const segments = l.pathname.split('/');
    // Default to root deployment base
    let base = '';
    // Check if we are hosted under the specific GitHub Pages repo path
    if (segments[1] === 'LogOut') {
      base = '/LogOut';
      // Also check for the nested preview environment
      if (segments[2] === 'preview') base += '/preview';
    }
    // Extract the remaining app route (everything after the base)
    const rest = l.pathname.slice(base.length + 1);
    // Redirect to the base path with the app route encoded in the query
    l.replace(
      l.protocol + '//' + l.host + base + '/' +
      '?redirect=' + encodeURIComponent(rest + l.search + l.hash)
    );
  </script>
</head>

<body>Redirecting…</body>

</html>
