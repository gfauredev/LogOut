[application]
name = "LogOut"
default_platform = "web"

[bundle]
identifier = "com.gfaure.logworkout"
publisher = "gfaure"

[web.app]
title = "LogOut - Workout Logger"

[web.watcher]
reload_html = true
index_on_404 = true

[bundle.android]
jks_file = "android/secrets/logout.jks"
jks_password = "DIOXUS_ASSET_SIGNING_STORE_PASS"
key_alias = "logout-key"
key_password = "DIOXUS_ASSET_SIGNING_KEY_PASS"

